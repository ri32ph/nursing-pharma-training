<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>看護学生向け薬理トレーニング</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif;background:linear-gradient(160deg,#f0f4ff 0%,#fafbff 50%,#f5f0ff 100%);min-height:100vh;color:#1a1a2e}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#f0f0f0}::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}

  /* ===== HOME ===== */
  #page-home{display:block}
  #page-list,#page-case{display:none}
  .home-header{text-align:center;padding:56px 20px 36px}
  .home-eyebrow{font-size:12px;color:#999;letter-spacing:4px;text-transform:uppercase;margin-bottom:14px}
  .home-title{font-size:clamp(26px,5vw,44px);font-weight:900;background:linear-gradient(90deg,#1a1a3e 0%,#4a6cf7 50%,#1a1a3e 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.25;margin-bottom:10px}
  .home-sub{color:#777;font-size:13px;letter-spacing:1px}
  .stats{display:flex;justify-content:center;gap:36px;margin-top:28px;flex-wrap:wrap}
  .stat-num{font-size:30px;font-weight:900;color:#1a1a2e}
  .stat-lbl{font-size:11px;color:#888;letter-spacing:1px;margin-top:2px}
  .cat-grid{max-width:900px;margin:0 auto;padding:0 20px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
  .cat-card{border-radius:16px;padding:26px 22px;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1.5px solid transparent;transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s}
  .cat-card:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,.12)}
  .cat-card:active{transform:scale(.97)}
  .cat-icon{font-size:34px;margin-bottom:10px}
  .cat-name{font-size:17px;font-weight:700;margin-bottom:6px}
  .cat-badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;letter-spacing:1px;font-weight:600}
  .cat-arrow{position:absolute;bottom:14px;right:18px;font-size:26px;font-weight:900;opacity:.4}
  .home-footer{text-align:center;color:#bbb;font-size:11px;padding-bottom:36px;letter-spacing:2px}

  /* ===== LIST ===== */
  .list-header{padding:28px 20px 20px;border-bottom:1px solid rgba(0,0,0,.08);background:rgba(255,255,255,.85);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10;box-shadow:0 1px 8px rgba(0,0,0,.06)}
  .back-btn{background:white;border:1px solid #ddd;color:#555;padding:5px 13px;border-radius:8px;cursor:pointer;font-size:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:14px;font-family:inherit}
  .back-btn:hover{background:#f5f5f5}
  .list-title-row{display:flex;align-items:center;gap:10px}
  .list-cat-name{font-size:20px;font-weight:900}
  .list-cat-sub{font-size:12px;color:#888;margin-top:2px}
  .case-list{max-width:720px;margin:0 auto;padding:20px 20px 60px}
  .case-row{display:flex;align-items:center;gap:14px;padding:16px 18px;margin-bottom:9px;background:white;border:1px solid #e8ecf0;border-radius:12px;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:transform .2s,box-shadow .2s}
  .case-row:hover{transform:translateX(6px);box-shadow:0 4px 14px rgba(0,0,0,.1)}
  .case-left-bar{position:absolute;left:0;top:0;bottom:0;width:3px;opacity:.8}
  .case-num{min-width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .case-symptom{font-size:14px;font-weight:600;color:#1a1a2e}
  .case-disease{font-size:11px;color:#888;margin-top:2px}
  .case-chevron{color:#aaa;font-size:18px;margin-left:auto}

  /* ===== CASE ===== */
  .case-header-bar{padding:14px 18px;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px;box-shadow:0 1px 8px rgba(0,0,0,.06)}
  .case-header-bar .back-btn{margin-bottom:0}
  .case-header-title{flex:1;text-align:center;font-size:13px;font-weight:600}
  .nav-btns{display:flex;gap:6px}
  .nav-btn{border:1px solid #ddd;background:white;padding:5px 11px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:opacity .2s,transform .2s}
  .nav-btn:hover{opacity:.8;transform:scale(1.05)}
  .case-body{max-width:720px;margin:0 auto;padding:28px 20px 60px}
  .case-card{background:white;border:1.5px solid rgba(0,0,0,.08);border-radius:20px;padding:28px 24px;margin-bottom:24px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
  .case-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;letter-spacing:1px;margin-bottom:14px;font-weight:600}
  .case-symptom-title{font-size:clamp(18px,4vw,24px);font-weight:900;color:#1a1a2e;line-height:1.3;margin-bottom:14px}
  .case-info-box{background:#f8f9fc;border-radius:10px;padding:11px 14px;border:1px solid #eee;display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
  .case-info-label{font-size:10px;color:#999;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
  .case-info-text{font-size:14px;color:#2a2a3e;font-weight:600}
  .case-drug-text{font-size:12px;color:#555;line-height:1.7}
  .progress-bar-row{display:flex;gap:7px;margin-bottom:6px}
  .progress-seg{flex:1;height:5px;border-radius:3px;background:#e0e4ee;transition:background .4s}
  .progress-label{font-size:11px;color:#aaa;text-align:center;margin-bottom:18px}
  .q-card{margin-bottom:14px}
  .q-btn{width:100%;background:white;border:1.5px solid #e0e4ee;border-radius:16px;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s;box-shadow:0 1px 4px rgba(0,0,0,.06);font-family:inherit}
  .q-btn:hover{transform:scale(1.01);box-shadow:0 4px 16px rgba(0,0,0,.1)}
  .q-btn:active{transform:scale(.98)}
  .q-btn.open{border-radius:16px 16px 0 0;box-shadow:none}
  .q-icon-wrap{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .q-label{font-size:15px;font-weight:700;text-align:left}
  .q-chevron{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:transform .3s}
  .q-chevron.open{transform:rotate(180deg)}
  .q-answer{border:1.5px solid #e0e4ee;border-top:none;border-radius:0 0 16px 16px;padding:18px 22px;animation:slideIn .3s cubic-bezier(.34,1.56,.64,1)}
  @keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .q-answer-text{font-size:13px;color:#2a2a3e;line-height:1.9;border-left:3px solid #ccc;padding-left:14px}
  .done-card{text-align:center;margin-top:28px;padding:24px;background:white;border-radius:16px;border:1.5px solid #e8ecf0;box-shadow:0 2px 12px rgba(0,0,0,.07)}
  .done-title{color:#2a2a3e;font-size:14px;font-weight:700;margin:8px 0 16px}
  .next-btn{border:none;color:white;padding:11px 26px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s}
  .next-btn:hover{opacity:.85}
  .back-cat-btn{border:1.5px solid;padding:9px 22px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;background:transparent;font-family:inherit}

  @media(max-width:480px){.cat-grid{grid-template-columns:1fr 1fr}.home-title{font-size:24px}}
</style>
</head>
<body>

<!-- ============================================================ HOME -->
<div id="page-home">
  <div class="home-header">
    <div class="home-eyebrow">Nursing Pharmacology Training</div>
    <h1 class="home-title">看護学生向け<br>薬理トレーニング</h1>
    <p class="home-sub">症状 → 疾患 → 薬 → 観察ポイント</p>
    <div class="stats">
      <div><div class="stat-num">115</div><div class="stat-lbl">症例</div></div>
      <div><div class="stat-num">8</div><div class="stat-lbl">カテゴリー</div></div>
      <div><div class="stat-num">3</div><div class="stat-lbl">設問/症例</div></div>
    </div>
  </div>
  <div class="cat-grid" id="cat-grid"></div>
  <div class="home-footer">PHARMACOLOGY × CLINICAL OBSERVATION</div>
</div>

<!-- ============================================================ LIST -->
<div id="page-list">
  <div class="list-header">
    <button class="back-btn" onclick="showHome()">← カテゴリー一覧</button>
    <div class="list-title-row">
      <span id="list-icon" style="font-size:28px"></span>
      <div>
        <div class="list-cat-name" id="list-cat-name"></div>
        <div class="list-cat-sub" id="list-cat-sub"></div>
      </div>
    </div>
  </div>
  <div class="case-list" id="case-list"></div>
</div>

<!-- ============================================================ CASE -->
<div id="page-case">
  <div class="case-header-bar">
    <button class="back-btn" onclick="showList(currentCatId)" style="margin-bottom:0">← 症例一覧</button>
    <div class="case-header-title" id="case-header-title"></div>
    <div class="nav-btns">
      <button class="nav-btn" id="btn-prev" onclick="navCase(-1)" style="display:none">‹ 前</button>
      <button class="nav-btn" id="btn-next" onclick="navCase(1)" style="display:none">次 ›</button>
    </div>
  </div>
  <div class="case-body" id="case-body"></div>
</div>

<script>
const CATEGORIES = [{"id":"respiratory","label":"① 呼吸器","color":"#0077B6","accent":"#0096C7","bg":"#E8F4FD","icon":"🫁","cases":[{"id":1,"symptom":"肺炎で入院中、抗菌薬開始後も発熱が続く","disease":"肺炎（治療抵抗性）","drug":"広域スペクトル抗菌薬（カルバペネム系など）","q1":"原因薬：最初に使用した抗菌薬（ペニシリン系・セフェム系）が原因菌に効いていない可能性。または薬剤熱（drug fever）として抗菌薬自体が発熱原因となる場合もある。","q2":"観察ポイント：体温の推移（時間ごと）・血液培養の結果・CRP/WBC値・投与開始から発熱継続日数・新たな感染巣の出現・薬剤熱の除外（他症状がない38℃台）","q3":"主な副作用：薬剤熱・皮疹・アナフィラキシー・下痢（偽膜性腸炎）・腎機能障害・肝機能障害"},{"id":2,"symptom":"COPD患者、呼吸困難が悪化","disease":"COPD（慢性閉塞性肺疾患）急性増悪","drug":"β2刺激薬（サルブタモール）・抗コリン薬（イプラトロピウム）・ステロイド","q1":"原因薬：β遮断薬（カルベジロールなど）がCOPD患者に投与されると気管支収縮を引き起こし呼吸困難を悪化させることがある。NSAIDsも喘息・COPD悪化の誘因となりうる。","q2":"観察ポイント：SpO₂値・呼吸数・呼吸音（wheezing）・補助呼吸筋の使用・口唇チアノーゼ・意識レベル・β遮断薬の投与有無確認","q3":"主な副作用：β2刺激薬→動悸・振戦・低K血症 / 抗コリン薬→口渇・尿閉・便秘 / ステロイド→血糖上昇・感染リスク増大"},{"id":3,"symptom":"喘息患者、夜間に喘鳴","disease":"気管支喘息（夜間発作）","drug":"吸入ステロイド薬（ICS）・長時間作用型β2刺激薬（LABA）","q1":"原因薬：ICSの吸入手技が不十分、または服薬アドヒアランスの低下。NSAIDs・アスピリンが誘発する場合（アスピリン喘息）もある。","q2":"観察ポイント：夜間〜早朝の発作頻度・吸入の手技確認・ピークフロー値・使用薬の残量確認・誘発因子（ハウスダスト・ペットなど）","q3":"主な副作用：ICS→口腔カンジダ（吸入後うがい必須）・嗄声 / LABA→動悸・振戦 / テオフィリン→悪心・頭痛・不整脈（血中濃度モニタリング必要）"},{"id":4,"symptom":"COPD患者、SpO₂低下","disease":"COPD（低酸素血症）","drug":"在宅酸素療法（HOT）・気管支拡張薬","q1":"原因薬：過剰な酸素投与（高流量O₂）により低酸素性換気ドライブが失われCO₂貯留（CO₂ナルコーシス）を招く危険がある。","q2":"観察ポイント：SpO₂目標値88〜92%（COPDは低め設定）・呼吸数・意識レベル（CO₂ナルコーシス徴候）・酸素流量の確認・血液ガス（PaCO₂）","q3":"主な副作用：β2刺激薬→低K血症・頻脈 / 抗コリン薬→口渇・尿閉 / 過剰酸素投与→CO₂ナルコーシス"},{"id":5,"symptom":"喘息発作で救急受診","disease":"重症喘息発作","drug":"短時間作用型β2刺激薬（SABA）・全身ステロイド・硫酸マグネシウム","q1":"原因薬：SABAの使用頻度増加は発作コントロール不良のサイン。アスピリン・NSAIDs・β遮断薬による誘発も確認する。","q2":"観察ポイント：SpO₂・呼吸数・呼吸困難の程度（会話・体位）・wheezing/silent chest・吸入治療への反応・意識レベル","q3":"主な副作用：SABA（サルブタモール）→頻脈・低K血症・振戦 / 全身ステロイド→高血糖・不眠・興奮 / マグネシウム→低血圧・悪心"},{"id":6,"symptom":"肺炎治療中、下痢出現","disease":"抗菌薬関連下痢症／偽膜性腸炎（CDI）","drug":"抗菌薬（特にクリンダマイシン・フルオロキノロン・広域ペニシリン）","q1":"原因薬：広域抗菌薬が腸内細菌叢を乱しClostridium difficileが増殖→毒素産生→偽膜性腸炎。特にクリンダマイシン・カルバペネムで高リスク。","q2":"観察ポイント：便の性状・回数・血便や粘液便の有無・腹痛・発熱・WBC上昇・CD毒素検査・腹部膨満（中毒性巨大結腸の除外）","q3":"主な副作用：抗菌薬→偽膜性腸炎（メトロニダゾール/バンコマイシン経口で治療）・腸内細菌叢変化・電解質異常"},{"id":7,"symptom":"COPD患者、口渇","disease":"COPD（維持療法中）","drug":"長時間作用型抗コリン薬（チオトロピウム：スピリーバ）","q1":"原因薬：チオトロピウム（LAMA）のムスカリン受容体遮断作用により唾液分泌が抑制されて口渇が出現。","q2":"観察ポイント：口渇の程度・水分摂取量・脱水徴候・尿量・口腔内の乾燥・吸入手技の確認","q3":"主な副作用：抗コリン薬→口渇・便秘・尿閉（前立腺肥大患者は特に注意）・閉塞隅角緑内障悪化（点眼禁忌）・口腔乾燥"},{"id":8,"symptom":"肺炎患者、呼吸数増加","disease":"肺炎（重症化徴候）","drug":"抗菌薬治療継続・酸素療法","q1":"原因薬：治療中の場合、抗菌薬に対するアレルギー反応（薬剤熱・薬剤性肺炎）が呼吸数増加を招くことがある。アナフィラキシーの初期徴候にも注意。","q2":"観察ポイント：呼吸数（正常12〜20/分）・SpO₂・体温・血圧・CRT（毛細血管再充満時間）・新たな皮疹・意識レベル（敗血症のqSOFA評価）","q3":"主な副作用：抗菌薬→薬剤性肺炎・アナフィラキシー / β-ラクタム系→アレルギー反応 / NSAIDs（解熱目的）→腎機能障害・胃粘膜障害"},{"id":9,"symptom":"喘息患者、動悸","disease":"気管支喘息（治療中）","drug":"β2刺激薬（サルブタモール/プロカテロール）","q1":"原因薬：β2刺激薬の心臓β1受容体への影響により頻脈・動悸が出現。テオフィリンも不整脈・動悸の原因となる（有効血中濃度10〜20μg/mL）。","q2":"観察ポイント：脈拍数・リズム・血圧・吸入回数（過剰使用の確認）・テオフィリン血中濃度・K値（低K→不整脈リスク）","q3":"主な副作用：β2刺激薬→動悸・頻脈・振戦・低K血症 / テオフィリン→悪心・嘔吐・頭痛・けいれん・不整脈（中毒域では重篤）"},{"id":10,"symptom":"COPD患者、手の震え","disease":"COPD（気管支拡張薬使用中）","drug":"短時間/長時間作用型β2刺激薬（SABA/LABA）","q1":"原因薬：β2刺激薬が骨格筋β2受容体を刺激することで振戦（手の震え）が出現。用量依存性副作用。","q2":"観察ポイント：振戦の程度・日常生活への支障・投与量・用法（過剰吸入の確認）・K値・脈拍","q3":"主な副作用：β2刺激薬→振戦・動悸・低K血症・頭痛 / テオフィリン→振戦・不整脈・血中濃度上昇で中毒症状"},{"id":11,"symptom":"COPD患者、尿閉","disease":"COPD（抗コリン薬使用中）","drug":"抗コリン薬（チオトロピウム・イプラトロピウム）","q1":"原因薬：抗コリン薬のムスカリン受容体遮断により排尿筋が弛緩→排尿困難・尿閉。特に前立腺肥大のある高齢男性は高リスク。","q2":"観察ポイント：排尿の有無・尿量・残尿感・下腹部膨満・前立腺肥大の既往確認・膀胱スキャンによる残尿測定","q3":"主な副作用：抗コリン薬→尿閉・口渇・便秘・頻脈・散瞳（緑内障増悪）/ 前立腺肥大患者では使用慎重"},{"id":12,"symptom":"肺炎治療後、皮疹","disease":"薬剤アレルギー/薬疹","drug":"ペニシリン系・セフェム系・スルファメトキサゾール（ST合剤）など","q1":"原因薬：ペニシリン系（アモキシシリン）・セフェム系・ST合剤による薬疹。治療終了後〜数日後に出現することもある（遅延型アレルギー）。","q2":"観察ポイント：皮疹の分布・性状（紅斑・蕁麻疹・水疱）・粘膜症状・発熱・SJS（Stevens-Johnson症候群）の徴候・アナフィラキシー徴候（血圧・SpO₂）","q3":"主な副作用：ペニシリン系→アナフィラキシー・蕁麻疹・薬疹 / ST合剤→重症薬疹（SJS/TEN）・骨髄抑制 / セフェム系→交差アレルギー（ペニシリンと約10%）"},{"id":13,"symptom":"COPD患者、便秘","disease":"COPD（抗コリン薬・オピオイド使用中）","drug":"抗コリン薬（チオトロピウム）/ オピオイド系鎮咳薬（コデインなど）","q1":"原因薬：抗コリン薬による腸管平滑筋の弛緩→腸蠕動低下→便秘。コデイン含有鎮咳薬もオピオイド作用により便秘を起こす。","q2":"観察ポイント：排便の頻度・便の性状・腹部膨満・腸蠕動音・水分摂取量・活動量","q3":"主な副作用：抗コリン薬→便秘・口渇・尿閉 / オピオイド→便秘（必ず下剤を予防的に処方）・悪心・眠気・呼吸抑制"},{"id":14,"symptom":"肺炎治療中、肝機能上昇","disease":"薬剤性肝障害","drug":"マクロライド系（クラリスロマイシン）・フルオロキノロン系・テトラサイクリン系","q1":"原因薬：クラリスロマイシンはCYP3A4阻害により肝代謝に影響。フルオロキノロン系・テトラサイクリン系でも薬剤性肝障害の報告がある。","q2":"観察ポイント：ALT・AST・ALP・γ-GTPの推移・黄疸（皮膚・眼球）・掻痒感・尿の色（濃い尿）・全身倦怠感","q3":"主な副作用：マクロライド系→肝機能障害・QT延長・悪心・下痢 / フルオロキノロン系→肝機能障害・腱断裂・QT延長・光過敏"},{"id":15,"symptom":"喘息患者、口腔カンジダ","disease":"吸入ステロイド使用中の口腔カンジダ症","drug":"吸入ステロイド薬（ICS：フルチカゾン・ブデソニド）","q1":"原因薬：ICS吸入後の口腔内・咽頭への薬剤残留がカンジダ増殖を促進。吸入後のうがい・水の飲み込みで予防できる。","q2":"観察ポイント：口腔内の白苔（拭うと出血）・咽頭痛・嚥下困難・吸入後のうがい実施状況・スペーサー使用の有無","q3":"主な副作用：ICS→口腔カンジダ（フルコナゾールで治療）・嗄声・咽頭刺激 ※全身性副作用は吸入では少ないが大量長期使用で骨粗鬆症リスク"},{"id":16,"symptom":"COPD患者、頻脈","disease":"COPD（気管支拡張薬使用中）","drug":"β2刺激薬（サルブタモール・ホルモテロール）","q1":"原因薬：β2刺激薬のβ1受容体への部分的作用により心拍数増加。テオフィリン過量でも頻脈を来す。","q2":"観察ポイント：脈拍数・リズム（不整脈の有無）・血圧・K値（低Kは不整脈リスク）・吸入回数の確認・テオフィリン血中濃度","q3":"主な副作用：β2刺激薬→頻脈・動悸・低K血症・振戦 / テオフィリン→頻脈・不整脈・中毒域でけいれん"},{"id":17,"symptom":"喘息患者、低K","disease":"気管支喘息（治療中）","drug":"β2刺激薬（大量使用）・全身ステロイド・利尿薬併用","q1":"原因薬：β2刺激薬によりK⁺が細胞内移動→血清K低下。ステロイドの鉱質コルチコイド作用・利尿薬が重なるとさらに低K悪化。","q2":"観察ポイント：K値（正常3.5〜5.0mEq/L）・筋力低下・筋けいれん・心電図（T波平坦化・U波出現）・吸入β2刺激薬の使用量","q3":"主な副作用：β2刺激薬→低K血症（不整脈リスク）・振戦・頻脈 / ステロイド→低K・高血糖・免疫抑制"},{"id":18,"symptom":"COPD患者、悪心","disease":"COPD（テオフィリン使用中）","drug":"テオフィリン（キサンチン系気管支拡張薬）","q1":"原因薬：テオフィリンは治療域が狭く（10〜20μg/mL）、血中濃度が上昇すると悪心・嘔吐・頭痛・不整脈・けいれんが出現する。","q2":"観察ポイント：テオフィリン血中濃度・悪心・嘔吐・頭痛・動悸・不眠・他薬との相互作用（CYP1A2阻害薬：シプロフロキサシン・エリスロマイシンで濃度上昇）","q3":"主な副作用：テオフィリン→悪心・嘔吐・頭痛・不眠・頻脈・不整脈・中毒域でけいれん（血中濃度管理が必須）"},{"id":19,"symptom":"肺炎治療中、腎機能低下","disease":"薬剤性腎障害","drug":"アミノグリコシド系（ゲンタマイシン）・バンコマイシン・造影剤・NSAIDs","q1":"原因薬：アミノグリコシド系は腎毒性が強く、特に高齢者・脱水状態・既存腎機能障害がある場合に注意。バンコマイシンも腎毒性あり（TDMで管理）。","q2":"観察ポイント：Cr・BUN・eGFR・尿量（乏尿<0.5mL/kg/h）・血中薬物濃度（TDM）・水分バランス・輸液量","q3":"主な副作用：アミノグリコシド→腎毒性・聴神経毒性（難聴）/ バンコマイシン→腎毒性・vancomycin flushing syndrome / NSAIDs→腎血流低下→急性腎障害"},{"id":20,"symptom":"COPD患者、倦怠感","disease":"COPD（長期管理中）","drug":"β遮断薬（誤投与）・鎮静薬・ステロイド長期使用","q1":"原因薬：COPDにβ遮断薬が投与されると気管支収縮と低血圧→倦怠感増強。長期ステロイド使用による副腎抑制・筋力低下（ステロイドミオパチー）も原因となる。","q2":"観察ポイント：倦怠感の程度・日常活動量・血圧・脈拍・血糖・電解質（Na・K・Ca）・副腎機能（長期ステロイドの場合）","q3":"主な副作用：β遮断薬→COPD悪化・倦怠感・徐脈 / 長期ステロイド→副腎抑制・骨粗鬆症・筋力低下・高血糖 / 鎮静薬→過鎮静・呼吸抑制"}]},{"id":"cardio","label":"② 循環器","color":"#C1121F","accent":"#E63946","bg":"#FFF0F0","icon":"🫀","cases":[{"id":1,"symptom":"心不全患者、浮腫悪化","disease":"慢性心不全（代償不全）","drug":"ループ利尿薬（フロセミド）・RAAS阻害薬","q1":"原因薬：利尿薬の効果不十分（利尿薬抵抗性）、またはNSAIDs・Ca拮抗薬（アムロジピン大量）が浮腫を悪化させる場合がある。","q2":"観察ポイント：毎日の体重測定（同一条件）・下肢浮腫（圧痕の有無・程度）・尿量・水分出納バランス・BNP/NT-proBNP・胸部X線","q3":"主な副作用：フロセミド→低K・低Na・脱水・血圧低下 / Ca拮抗薬→末梢浮腫・顔面紅潮 / NSAIDs→水分貯留（禁忌に近い）"},{"id":2,"symptom":"心不全患者、体重増加","disease":"慢性心不全（水分貯留）","drug":"利尿薬の調整","q1":"原因薬：利尿薬の中断・減量、または塩分・水分過剰摂取。NSAIDs（腎血流低下→水分貯留）や一部の降圧薬も体重増加の原因となる。","q2":"観察ポイント：体重の日内変動（2日で2kg・週で3kg増加は受診サイン）・浮腫・尿量・呼吸困難の有無・服薬コンプライアンス","q3":"主な副作用：フロセミド中断→急性うっ血 / NSAIDs→水分貯留・腎障害 / ステロイド→Na水分貯留・高血糖"},{"id":3,"symptom":"心不全患者、呼吸困難","disease":"慢性心不全（急性増悪）","drug":"利尿薬・硝酸薬・酸素療法","q1":"原因薬：β遮断薬の急激な増量が心不全を一時的に悪化させることがある。抗不整脈薬（陰性変力作用）・Ca拮抗薬（非ジヒドロピリジン系）も心機能抑制の原因となる。","q2":"観察ポイント：SpO₂・呼吸数・起坐呼吸・発作性夜間呼吸困難・肺雑音（湿性ラ音）・BNP・尿量・体重","q3":"主な副作用：β遮断薬急増量→心不全増悪 / 硝酸薬→頭痛・低血圧 / フロセミド急速投与→低K・血圧低下"},{"id":4,"symptom":"高血圧患者、めまい","disease":"高血圧（降圧過剰・起立性低血圧）","drug":"降圧薬（ACE阻害薬・ARB・Ca拮抗薬・利尿薬）","q1":"原因薬：降圧薬の過剰投与や急激な降圧により起立性低血圧を来す。特にα遮断薬（ドキサゾシン）・利尿薬・硝酸薬で起立性低血圧リスク高い。","q2":"観察ポイント：臥位・立位での血圧測定（起立性低血圧：臥位→立位で収縮期20mmHg以上低下）・めまいのタイミング・転倒リスク評価","q3":"主な副作用：α遮断薬→起立性低血圧（初回投与で著明）/ Ca拮抗薬→顔面紅潮・頭痛・浮腫 / 利尿薬→脱水・低K"},{"id":5,"symptom":"高血圧治療後、乾いた咳","disease":"ACE阻害薬誘発性咳嗽","drug":"ACE阻害薬（エナラプリル・ペリンドプリル）","q1":"原因薬：ACE阻害薬によりブラジキニンが蓄積→気道刺激→乾いた咳（東アジア人は発生率が欧米より高く10〜30%）。ARBに変更することで改善する。","q2":"観察ポイント：咳の性状（乾性・湿性）・開始時期・服薬歴確認（ACE阻害薬の有無）・他の咳原因（感染・心不全）との鑑別","q3":"主な副作用：ACE阻害薬→空咳（最多）・高K血症・血管浮腫（血管性浮腫：緊急）・低血圧・腎機能変化"},{"id":6,"symptom":"β遮断薬開始後、徐脈","disease":"β遮断薬使用中（心不全・高血圧・狭心症）","drug":"β遮断薬（カルベジロール・ビソプロロール・メトプロロール）","q1":"原因薬：β1受容体遮断による洞結節の自動能低下→心拍数減少。特に高齢者・洞機能不全・房室ブロック患者では著明な徐脈リスクがある。","q2":"観察ポイント：脈拍数（目標：安静時55〜65/分）・心電図（P波・PR間隔・房室ブロック）・症状（めまい・失神・倦怠感）・血圧","q3":"主な副作用：β遮断薬→徐脈・低血圧・倦怠感・末梢冷感・気管支収縮（COPD/喘息禁忌）・空腹時血糖マスク（糖尿病患者注意）"},{"id":7,"symptom":"利尿薬投与後、低K","disease":"利尿薬使用中（心不全・高血圧）","drug":"ループ利尿薬（フロセミド）・サイアザイド系（ヒドロクロロチアジド）","q1":"原因薬：ループ利尿薬・サイアザイド系はヘンレループ・遠位尿細管でのK排泄を促進→低K血症。デジタリス（ジゴキシン）使用中は低Kで中毒リスク増大。","q2":"観察ポイント：K値（正常3.5〜5.0mEq/L）・心電図（T波平坦化・U波・QT延長）・筋力低下・筋けいれん・ジゴキシン使用の有無","q3":"主な副作用：ループ利尿薬→低K・低Na・低Mg・脱水・耳毒性（大量静注） / サイアザイド→低K・高尿酸・高血糖"},{"id":8,"symptom":"利尿薬投与後、脱水","disease":"過剰利尿・脱水","drug":"ループ利尿薬（フロセミド過量）","q1":"原因薬：フロセミド過量投与や水分摂取不足により有効循環血液量が低下→脱水・腎前性腎障害・血圧低下を来す。","q2":"観察ポイント：尿量（24時間）・体重変化・皮膚ツルゴール・口腔粘膜乾燥・血圧・脈拍（頻脈）・BUN/Cr比・尿比重","q3":"主な副作用：フロセミド→脱水・低K・低Na・低Mg・高尿酸・耳毒性（大量急速投与）・血圧低下"},{"id":9,"symptom":"心不全患者、低血圧","disease":"心不全（過剰降圧・治療薬副作用）","drug":"硝酸薬・ACE阻害薬・ARB・フロセミド","q1":"原因薬：硝酸薬（静脈拡張→前負荷低下）・ACE阻害薬/ARB（血管拡張）・フロセミド（循環血液量減少）の単独または組み合わせにより低血圧を来す。","q2":"観察ポイント：収縮期血圧（<90mmHgは危険）・脈拍・末梢循環（四肢冷感・CRT延長）・意識レベル・尿量・水分バランス","q3":"主な副作用：硝酸薬→低血圧・頭痛 / ACE阻害薬→低血圧（初回投与）/ フロセミド→脱水による低血圧 / β遮断薬→陰性変力作用"},{"id":10,"symptom":"狭心症患者、胸痛","disease":"安定狭心症/不安定狭心症","drug":"硝酸薬（ニトログリセリン）・β遮断薬・Ca拮抗薬","q1":"原因薬：硝酸薬の効果が不十分な場合、不安定狭心症への移行を考える。PDE5阻害薬（シルデナフィル）使用中の硝酸薬は重篤な低血圧を招く（禁忌）。","q2":"観察ポイント：胸痛の性状（部位・放散・持続時間・誘因）・ニトログリセリン効果（3分以内に改善）・心電図（ST変化）・バイタルサイン","q3":"主な副作用：ニトログリセリン→頭痛・低血圧・反射性頻脈 / β遮断薬→徐脈・倦怠感 / Ca拮抗薬→浮腫・便秘・頭痛"},{"id":11,"symptom":"ニトログリセリン使用後、頭痛","disease":"狭心症（硝酸薬使用中）","drug":"ニトログリセリン（亜硝酸薬）","q1":"原因薬：ニトログリセリンによる脳血管拡張（一酸化窒素→cGMP増加→血管平滑筋弛緩）→拍動性頭痛。用量依存性で高頻度（30〜60%）。","q2":"観察ポイント：頭痛の性状・程度・血圧低下の程度・起立性低血圧・効果（胸痛改善）の確認・使用後の臥位安静の指導","q3":"主な副作用：ニトログリセリン→頭痛（最多）・低血圧・反射性頻脈・顔面紅潮 ※PDE5阻害薬との併用は重篤低血圧（絶対禁忌）"},{"id":12,"symptom":"ARB開始後、K上昇","disease":"高血圧/心不全（ARB使用）","drug":"ARB（ロサルタン・カンデサルタン）・ACE阻害薬","q1":"原因薬：ARB/ACE阻害薬によるアルドステロン分泌抑制→K排泄低下→高K血症。腎機能低下・K保持利尿薬・NSAIDs併用でリスク増大。","q2":"観察ポイント：K値（>5.5mEq/Lで高K血症）・心電図（テント状T波・QRS幅広・P波消失）・腎機能（Cr・eGFR）・筋力・感覚異常","q3":"主な副作用：ARB→高K血症・低血圧・腎機能悪化 / ACE阻害薬→高K・空咳・血管浮腫 ※両者の併用は高K・腎障害リスクで原則禁忌"},{"id":13,"symptom":"利尿薬使用後、尿量増加","disease":"心不全/高血圧（利尿薬使用）","drug":"ループ利尿薬（フロセミド）・サイアザイド系","q1":"原因薬：利尿薬の治療効果として尿量増加が生じる（目的とした効果）。ただし過剰な尿量増加は脱水・電解質異常のリスクとなる。","q2":"観察ポイント：1日尿量目標（心不全では出納バランスが重要）・脱水徴候・電解質（K・Na・Cl）・体重・血圧変化・水分出納記録","q3":"主な副作用：フロセミド→低K・低Na・脱水・耳毒性 / サイアザイド→低K・高尿酸・高血糖・低Na"},{"id":14,"symptom":"心不全患者、夜間呼吸困難","disease":"心不全（発作性夜間呼吸困難）","drug":"利尿薬・硝酸薬","q1":"原因薬：利尿薬の夕方以降の投与により夜間に利尿が重なることがある。就寝後の臥位による静脈還流増加→肺うっ血→発作性夜間呼吸困難（PND）。","q2":"観察ポイント：発作時刻・起坐呼吸の有無・SpO₂・呼吸数・肺雑音・BNP値・フロセミドの投与時刻（午前中投与が望ましい）・体重","q3":"主な副作用：フロセミド→低K・低Na・脱水 / 硝酸薬→頭痛・低血圧 ※フロセミドは夕方以降の投与は夜間頻尿・夜間低血圧を起こしやすい"},{"id":15,"symptom":"β遮断薬使用後、倦怠感","disease":"心不全/高血圧（β遮断薬使用）","drug":"β遮断薬（カルベジロール・ビソプロロール）","q1":"原因薬：β遮断薬による心拍出量低下・末梢血管抵抗変化→倦怠感・疲労感。開始初期に多く、4〜6週で改善することが多い。","q2":"観察ポイント：倦怠感の程度・日常活動への影響・脈拍・血圧・SpO₂・末梢冷感・気分の変化（抑うつ症状）","q3":"主な副作用：β遮断薬→倦怠感・徐脈・低血圧・末梢冷感・うつ症状・気管支収縮（喘息禁忌）・血糖マスク"},{"id":16,"symptom":"利尿薬投与後、頻尿","disease":"心不全/高血圧（利尿薬使用）","drug":"ループ利尿薬（フロセミド）","q1":"原因薬：利尿薬の主作用として排尿促進が起き、投与後1〜2時間で頻尿となる。夜間投与では夜間頻尿・睡眠障害の原因となる。","q2":"観察ポイント：排尿回数・尿量・投与時刻（午前中を推奨）・転倒リスク（夜間の移動）・水分バランス・電解質","q3":"主な副作用：フロセミド→頻尿（治療的）・低K・低Na・脱水・起立性低血圧 ※夜間投与は夜間頻尿・転倒リスク増大"},{"id":17,"symptom":"降圧薬開始後、ふらつき","disease":"起立性低血圧（降圧薬）","drug":"ACE阻害薬・ARB・Ca拮抗薬・α遮断薬・利尿薬","q1":"原因薬：降圧薬開始・増量後の過剰降圧、特に起立時に血圧が急落する起立性低血圧。α遮断薬は初回投与で著明（first dose効果）。高齢者・脱水時に注意。","q2":"観察ポイント：臥位・立位・座位での血圧測定（orthostatic test）・ふらつきのタイミング・転倒リスク・脈拍・脱水徴候","q3":"主な副作用：α遮断薬→起立性低血圧（初回用量）/ Ca拮抗薬→顔面紅潮・頭痛・浮腫 / 利尿薬→脱水による低血圧 / ACE阻害薬→低血圧"},{"id":18,"symptom":"心不全患者、SpO₂低下","disease":"心不全（肺うっ血・胸水）","drug":"利尿薬・酸素療法強化","q1":"原因薬：降圧薬・利尿薬の効果不十分による肺うっ血進行がSpO₂低下を招く。または過剰な輸液が心不全を増悪させSpO₂低下をきたすことがある。","q2":"観察ポイント：SpO₂・呼吸数・肺雑音（両側湿性ラ音）・胸部X線（肺血管影増強・Kerley B線・胸水）・体重・尿量・BNP","q3":"主な副作用：β遮断薬過量→心機能抑制 / 過剰輸液→急性肺水腫 / フロセミド不足→肺うっ血"},{"id":19,"symptom":"抗血小板薬服用中、出血","disease":"動脈硬化性疾患（抗血小板薬療法）","drug":"アスピリン・クロピドグレル（プラビックス）・チカグレロル","q1":"原因薬：抗血小板薬による血小板凝集抑制→出血時間延長→皮下出血・消化管出血・脳出血リスク増大。2剤併用（DAPT）ではさらにリスク上昇。","q2":"観察ポイント：出血部位・出血量・黒色便・血便・頭痛（脳出血）・血圧・Hb値・皮下出血の広がり・手術・処置前の服薬確認","q3":"主な副作用：アスピリン→消化管出血・消化管潰瘍（PPI併用で予防）/ クロピドグレル→出血・稀に血栓性血小板減少性紫斑病（TTP）"},{"id":20,"symptom":"抗凝固薬服用中、血尿","disease":"心房細動/深部静脈血栓症（抗凝固療法）","drug":"ワルファリン・DOAC（リバーロキサバン・アピキサバン・ダビガトラン）","q1":"原因薬：抗凝固薬による凝固能低下→泌尿器系出血（血尿）・消化管出血・脳出血リスク。ワルファリンはINR管理が必要（目標1.6〜2.6）。","q2":"観察ポイント：血尿の程度（色調・量）・他の出血徴候・PT-INR（ワルファリン）・腎機能（DOAC排泄）・併用薬（相互作用）・転倒リスク","q3":"主な副作用：ワルファリン→出血（PT-INR管理）・食品相互作用（VitK） / DOAC→出血（拮抗薬あり：ダビガトランにはイダルシズマブ）"}]},{"id":"diabetes","label":"③ 糖尿病","color":"#1B7A3E","accent":"#2DC653","bg":"#EAF7EF","icon":"🩸","cases":[{"id":1,"symptom":"インスリン使用中、低血糖","disease":"糖尿病（インスリン療法）","drug":"インスリン（基礎・追加インスリン）","q1":"原因薬：インスリン過量・食事量の減少・運動量増加・飲酒がインスリン効果を相対的に過剰にし低血糖を来す。SU薬（グリメピリド）との併用もリスク。","q2":"観察ポイント：血糖値（<70mg/dLで低血糖）・症状（発汗・振戦・動悸・頭痛・意識障害）・最終食事時刻・インスリン注射量と部位・活動量","q3":"主な副作用：インスリン→低血糖（最重要）・注射部位リポジストロフィー・体重増加 ※β遮断薬は低血糖症状（動悸・振戦）をマスクするため注意"},{"id":2,"symptom":"糖尿病患者、口渇","disease":"高血糖/糖尿病性口渇","drug":"血糖コントロール不良","q1":"原因薬：高血糖による浸透圧利尿→脱水→口渇。ステロイド（血糖上昇）・SGLT2阻害薬（浸透圧利尿）も口渇の原因となる。抗コリン薬も口渇を起こす。","q2":"観察ポイント：血糖値・HbA1c・尿糖・尿量・体重変化・脱水徴候・水分摂取量・ステロイド使用の有無","q3":"主な副作用：ステロイド→血糖上昇（ステロイド糖尿病） / SGLT2阻害薬→浸透圧利尿・口渇・脱水 / 抗コリン薬→口渇（血糖と無関係）"},{"id":3,"symptom":"SGLT2阻害薬開始後、頻尿","disease":"2型糖尿病（SGLT2阻害薬療法）","drug":"SGLT2阻害薬（エンパグリフロジン・ダパグリフロジン・カナグリフロジン）","q1":"原因薬：SGLT2阻害薬による腎尿細管でのグルコース再吸収阻害→尿中グルコース排泄増加→浸透圧利尿→頻尿・多尿。治療的効果でもあるが過剰では脱水リスク。","q2":"観察ポイント：尿量・排尿回数・脱水徴候・血圧（体液量減少による低血圧）・体重・尿路感染症状（尿糖増加で感染リスク）・外陰部カンジダ","q3":"主な副作用：SGLT2阻害薬→頻尿・脱水・尿路感染・性器感染（カンジダ）・正常血糖ケトアシドーシス（DKA）"},{"id":4,"symptom":"糖尿病患者、尿路感染","disease":"糖尿病性免疫低下/SGLT2阻害薬使用中","drug":"SGLT2阻害薬（尿糖増加による感染リスク）","q1":"原因薬：SGLT2阻害薬による尿糖増加で細菌が増殖しやすい環境→尿路感染・性器感染リスク増加。高血糖自体も免疫低下をきたす。","q2":"観察ポイント：排尿時痛・頻尿・発熱・混濁尿・下腹部不快感・尿検査（白血球・亜硝酸塩）・血糖コントロール状況","q3":"主な副作用：SGLT2阻害薬→尿路感染・外陰部・会陰部感染（フルニエ壊疽：稀だが重篤）/ 高血糖→免疫抑制・創傷治癒遅延"},{"id":5,"symptom":"GLP-1使用後、悪心","disease":"2型糖尿病（GLP-1受容体作動薬療法）","drug":"GLP-1受容体作動薬（リラグルチド・セマグルチド・エキセナチド）","q1":"原因薬：GLP-1受容体作動薬による胃排泄遅延・中枢性の食欲抑制→悪心・嘔吐。特に開始初期・増量時に多い。食事量と注射タイミングの調整で軽減可能。","q2":"観察ポイント：悪心・嘔吐の程度・食事摂取量・体重変化・脱水徴候・注射タイミングと食事の関係","q3":"主な副作用：GLP-1受容体作動薬→悪心（最多）・嘔吐・下痢・便秘・膵炎（稀・腹痛あれば中止）/ 心拍数増加 / 甲状腺C細胞腫瘍（動物実験）"},{"id":6,"symptom":"DPP-4阻害薬使用中、皮疹","disease":"2型糖尿病（DPP-4阻害薬療法）","drug":"DPP-4阻害薬（シタグリプチン・アログリプチン・テネリグリプチン）","q1":"原因薬：DPP-4阻害薬による免疫調節（T細胞活性化）に関連した水疱性類天疱瘡（高齢者に多い皮膚疾患）が報告されている。また薬疹としてじんましん・紅斑が出ることもある。","q2":"観察ポイント：皮疹の部位・性状（水疱・紅斑・蕁麻疹）・瘙痒感・粘膜症状・開始時期との関連・水疱性類天疱瘡の早期発見","q3":"主な副作用：DPP-4阻害薬→水疱性類天疱瘡・鼻咽頭炎・関節痛（稀に重症）/ 低血糖は単独では少ないがSU薬・インスリン併用で増加"},{"id":7,"symptom":"メトホルミン服用中、下痢","disease":"2型糖尿病（メトホルミン療法）","drug":"ビグアナイド系（メトホルミン：グルコファージ）","q1":"原因薬：メトホルミンの消化管への直接刺激作用・腸内細菌叢への影響により悪心・下痢・腹痛が出現。食後服用・徐放剤への変更で軽減可能。","q2":"観察ポイント：下痢の頻度・性状・食事との関係・服薬タイミング（食前か食後か）・腎機能（腎障害あると乳酸アシドーシスリスク）","q3":"主な副作用：メトホルミン→悪心・下痢・腹痛（最多・消化器症状）・乳酸アシドーシス（腎障害・肝障害・心不全・造影剤使用時は中止）"},{"id":8,"symptom":"糖尿病患者、倦怠感","disease":"高血糖/低血糖/合併症","drug":"インスリン・SU薬・経口血糖降下薬全般","q1":"原因薬：高血糖（エネルギー利用障害）・低血糖（エネルギー不足）の両方で倦怠感が出現する。ステロイドによる高血糖も倦怠感の原因となる。","q2":"観察ポイント：血糖値・HbA1c・食事摂取量・睡眠・活動量・脱水の有無・甲状腺機能（倦怠感との鑑別）・貧血（ビタミンB12欠乏：メトホルミンで減少）","q3":"主な副作用：SU薬→低血糖・体重増加 / メトホルミン→ビタミンB12欠乏（長期使用）/ インスリン→低血糖・体重増加 / ステロイド→高血糖"},{"id":9,"symptom":"糖尿病患者、脱水","disease":"高血糖性高浸透圧状態/SGLT2阻害薬","drug":"SGLT2阻害薬・利尿薬・高血糖状態","q1":"原因薬：SGLT2阻害薬の浸透圧利尿・高血糖による浸透圧利尿が脱水を来す。利尿薬（フロセミド）との併用でさらに脱水リスク増大。","q2":"観察ポイント：口渇・尿量・皮膚ツルゴール低下・口腔粘膜乾燥・血圧・脈拍（頻脈）・体重変化・BUN/Cr比・Na濃度","q3":"主な副作用：SGLT2阻害薬→脱水・低血圧・急性腎障害リスク / 高血糖→浸透圧利尿による脱水（高浸透圧高血糖症候群：HHS）"},{"id":10,"symptom":"糖尿病患者、食欲低下","disease":"薬剤性食欲低下/合併症","drug":"GLP-1受容体作動薬・メトホルミン・SU薬（低血糖後）","q1":"原因薬：GLP-1受容体作動薬の中枢的食欲抑制作用・胃排泄遅延による食欲低下。メトホルミンの消化器症状も食欲低下を招く。低血糖後の食欲異常増進にも注意。","q2":"観察ポイント：食事摂取量・体重変化・血糖値（食事量減少→低血糖リスク）・悪心・嘔吐の有無・注射タイミング","q3":"主な副作用：GLP-1受容体作動薬→食欲低下（治療的効果でもある）・悪心 / メトホルミン→食欲低下・消化器症状 / SU薬→低血糖後の過食"}]},{"id":"neuro","label":"④ 神経・精神","color":"#6A3DB8","accent":"#9B72CF","bg":"#F3EEFF","icon":"🧠","cases":[{"id":1,"symptom":"睡眠薬使用後、ふらつき","disease":"不眠症（睡眠薬療法）","drug":"ベンゾジアゼピン系（ニトラゼパム）・非BZD系（ゾルピデム）・オレキシン受容体拮抗薬（スボレキサント）","q1":"原因薬：ベンゾジアゼピン系・非BZD系睡眠薬による筋弛緩作用・鎮静作用が翌朝まで持続→ふらつき・転倒リスク（特に高齢者）。半減期の長い薬剤でリスク高い。","q2":"観察ポイント：ふらつきのタイミング（服薬後・起床時）・転倒の有無・筋力・バランス機能・薬剤の半減期・腎/肝機能（高齢者は排泄低下）","q3":"主な副作用：BZD系→筋弛緩・ふらつき・転倒・健忘・依存性 / 非BZD系→転倒・複雑睡眠行動（歩行・運転）/ スボレキサント→翌朝眠気・ふらつき"},{"id":2,"symptom":"ベンゾジアゼピン使用後、眠気","disease":"不安障害/不眠症（BZD使用）","drug":"ベンゾジアゼピン系（アルプラゾラム・ジアゼパム・ロラゼパム）","q1":"原因薬：BZD系のGABA-A受容体増強作用による中枢神経抑制→過剰な鎮静・眠気。高齢者・肝機能低下患者では蓄積しやすい。","q2":"観察ポイント：眠気の程度（日常生活への影響）・服薬時刻・投与量・肝/腎機能・他の中枢抑制薬との併用・呼吸状態（呼吸抑制に注意）","q3":"主な副作用：BZD系→眠気・認知機能低下・健忘・依存・離脱症状（急な中止で離脱けいれん）・呼吸抑制（過量・アルコール併用で危険）"},{"id":3,"symptom":"抗うつ薬開始後、悪心","disease":"うつ病/不安障害（抗うつ薬療法）","drug":"SSRI（エスシタロプラム・フルボキサミン）・SNRI（デュロキセチン）","q1":"原因薬：SSRI/SNRIの消化管セロトニン受容体（5-HT3）刺激による悪心・嘔吐。開始直後〜2週間に多く、継続すると改善することが多い。食後服用で軽減。","q2":"観察ポイント：悪心の程度・服薬タイミング（食後か）・食事摂取量・体重変化・開始からの日数・自殺念慮（開始初期に増加する可能性）","q3":"主な副作用：SSRI→悪心・下痢・性機能障害・セロトニン症候群（MAO阻害薬との禁忌）/ SNRI→悪心・血圧上昇・頻脈"},{"id":4,"symptom":"SSRI開始後、下痢","disease":"うつ病（SSRI療法）","drug":"SSRI（選択的セロトニン再取り込み阻害薬）","q1":"原因薬：SSRIによる腸管セロトニン系活性化→腸管運動亢進→下痢。フルボキサミン・パロキセチンで比較的多い。通常は2〜4週で改善。","q2":"観察ポイント：下痢の頻度・性状・腹痛の有無・水分摂取量・体重変化・電解質・服薬継続の意思確認（副作用による中断防止）","q3":"主な副作用：SSRI→下痢・悪心・頭痛・性機能障害・出血リスク増加（血小板機能抑制）/ セロトニン症候群（他剤との相互作用で重篤）"},{"id":5,"symptom":"抗精神病薬使用後、錐体外路症状","disease":"統合失調症/躁病（抗精神病薬療法）","drug":"定型抗精神病薬（ハロペリドール）・非定型（一部：リスペリドン高用量）","q1":"原因薬：ドパミンD2受容体遮断による錐体外路症状（アカシジア・パーキンソン症状・ジストニア・遅発性ジスキネジア）。定型抗精神病薬で高頻度。","q2":"観察ポイント：振戦・筋固縮・アカシジア（じっとしていられない）・ジストニア（筋収縮・頸部傾斜）・歩行障害・表情・AIMS評価","q3":"主な副作用：定型抗精神病薬→EPS（錐体外路）・高プロラクチン血症・悪性症候群（高熱・筋強直・意識障害） / 非定型→代謝異常・体重増加"},{"id":6,"symptom":"認知症患者、徐脈","disease":"認知症（アルツハイマー型・レビー小体型）","drug":"コリンエステラーゼ阻害薬（ドネペジル・リバスチグミン・ガランタミン）","q1":"原因薬：コリンエステラーゼ阻害薬によるアセチルコリン増加→心臓ムスカリン受容体刺激→洞機能抑制→徐脈・失神。特に洞機能不全・房室ブロック患者で注意。","q2":"観察ポイント：脈拍数・心電図（洞徐脈・房室ブロック）・血圧・めまい・失神エピソード・転倒歴・心疾患の既往","q3":"主な副作用：コリンエステラーゼ阻害薬→悪心・嘔吐・食欲低下・下痢・徐脈・失神 / メマンチン→めまい・頭痛（比較的副作用少ない）"},{"id":7,"symptom":"抗てんかん薬使用後、眠気","disease":"てんかん（薬物療法）","drug":"バルプロ酸・カルバマゼピン・ラモトリギン・レベチラセタム","q1":"原因薬：多くの抗てんかん薬が中枢神経系に作用するため眠気が副作用として出現。特にフェノバルビタール・バルプロ酸・カルバマゼピン開始初期に多い。","q2":"観察ポイント：眠気の程度・日常生活への影響（車の運転等）・服薬時刻の工夫・血中薬物濃度・発作頻度（眠気で服薬忘れがないか）","q3":"主な副作用：バルプロ酸→眠気・体重増加・肝障害・催奇形性 / カルバマゼピン→眠気・低Na・発疹・SJS / レベチラセタム→易刺激性・行動変化"},{"id":8,"symptom":"抗うつ薬使用後、食欲低下","disease":"うつ病（抗うつ薬療法）","drug":"SSRI・SNRI・三環系抗うつ薬（TCA）","q1":"原因薬：SSRIは食欲低下を来すことがあるが、逆に三環系抗うつ薬（TCA）は食欲増進・体重増加を来すことが多い。原疾患（うつ病）自体の食欲低下との鑑別が重要。","q2":"観察ポイント：食事摂取量・体重変化・うつ症状の改善度・悪心の有無・BMI・電解質（低Na：SIADH）","q3":"主な副作用：SSRI→食欲低下・低Na（SIADH）/ TCA→食欲増進・口渇・便秘・尿閉（抗コリン）・QT延長 / SNRI→食欲低下・血圧上昇"},{"id":9,"symptom":"睡眠薬使用後、転倒","disease":"不眠症（高齢者）","drug":"ベンゾジアゼピン系・非BZD系（ゾルピデム）・抗ヒスタミン薬","q1":"原因薬：BZD系・非BZD系の筋弛緩作用・翌朝への持越し効果により起床時のふらつき・転倒が起きる。高齢者では骨折リスクが高く特に重要。","q2":"観察ポイント：転倒の時刻・状況・意識レベル・受傷の有無・薬剤の半減期・筋力・バランス・ベッドサイドの環境（ナースコール・手すり）","q3":"主な副作用：BZD系→転倒・骨折・認知機能低下 / 非BZD系（ゾルピデム）→睡眠時行動（夢遊・健忘）・転倒 ※高齢者にはBZD系は原則避ける（ビアーズ基準）"},{"id":10,"symptom":"抗精神病薬使用後、体重増加","disease":"統合失調症（非定型抗精神病薬療法）","drug":"非定型抗精神病薬（オランザピン・クエチアピン・クロザピン）","q1":"原因薬：非定型抗精神病薬のヒスタミンH1受容体・セロトニン5-HT2C受容体遮断による食欲増進・代謝異常→体重増加・メタボリック症候群。オランザピンが特に顕著。","q2":"観察ポイント：体重・BMI・腹囲・血糖・脂質（LDL・TG）・血圧（代謝症候群スクリーニング）・食欲・活動量","q3":"主な副作用：オランザピン/クエチアピン→体重増加・高血糖・糖尿病・脂質異常・EPS少ない / クロザピン→体重増加・無顆粒球症（血液モニタリング必須）"},{"id":11,"symptom":"抗精神病薬使用後、便秘","disease":"統合失調症（抗精神病薬療法）","drug":"抗精神病薬（特にオランザピン・クロザピン・低力価定型）","q1":"原因薬：抗精神病薬の抗コリン作用（ムスカリン受容体遮断）により腸管運動が低下→便秘。クロザピンは最も強い抗コリン作用を持ち腸閉塞の報告もある。","q2":"観察ポイント：排便の頻度・腸蠕動音・腹部膨満・腹痛（腸閉塞の除外）・水分摂取量・活動量・下剤の使用状況","q3":"主な副作用：クロザピン→重篤な便秘・腸閉塞（致死的）/ 低力価定型→強い抗コリン作用 / オランザピン→便秘・体重増加・高血糖"},{"id":12,"symptom":"抗うつ薬使用後、口渇","disease":"うつ病（三環系抗うつ薬）","drug":"三環系抗うつ薬（TCA：アミトリプチリン・イミプラミン）","q1":"原因薬：TCAの強力な抗ムスカリン作用→唾液分泌抑制→口渇。また尿閉・便秘・散瞳・頻脈なども来す。高齢者では特に問題となる。","q2":"観察ポイント：口渇の程度・虫歯リスク（唾液減少）・尿閉・便秘・視力変化（散瞳）・脈拍・心電図（QT延長・TCAは心毒性）","q3":"主な副作用：TCA→口渇・尿閉・便秘・頻脈・QT延長・起立性低血圧・鎮静 / 過量投与で重篤な不整脈・けいれん（緊急性高い）"},{"id":13,"symptom":"ベンゾジアゼピン使用後、呼吸抑制","disease":"BZD過量/高齢者・COPD患者","drug":"ベンゾジアゼピン系（特にジアゼパム・ミダゾラム）","q1":"原因薬：BZD系の中枢神経抑制（GABA-A受容体増強）による呼吸中枢抑制→呼吸数低下・換気量低下。アルコール・オピオイド・全身麻酔薬との併用で特に危険。","q2":"観察ポイント：呼吸数（<12/分は危険）・SpO₂・意識レベル（GCS）・呼気CO₂・縮瞳の有無・アルコール・他の中枢抑制薬の使用歴","q3":"主な副作用：BZD系→呼吸抑制（特に過量・アルコール・オピオイド併用）・意識障害 ※拮抗薬：フルマゼニル（注：作用時間短くBZDの方が長時間）"},{"id":14,"symptom":"抗てんかん薬使用後、発疹","disease":"てんかん（薬物療法）","drug":"カルバマゼピン・ラモトリギン・フェニトイン","q1":"原因薬：カルバマゼピン・ラモトリギン・フェニトインは薬疹のリスクが高く、重症薬疹（SJS/TEN）の原因として最も多い薬剤の一つ。特にHLA-B*1502陽性のアジア人はカルバマゼピンで高リスク。","q2":"観察ポイント：皮疹の性状（紅斑・水疱・粘膜症状）・発熱・SJS徴候（眼・口腔・外陰部粘膜病変）・開始からの時期（通常8週以内）","q3":"主な副作用：カルバマゼピン→SJS（HLA-B*1502で高リスク）・低Na・眠気・肝障害 / ラモトリギン→発疹・SJS（特に急速増量で）"},{"id":15,"symptom":"認知症薬使用後、下痢","disease":"アルツハイマー型認知症（コリンエステラーゼ阻害薬）","drug":"ドネペジル・リバスチグミン・ガランタミン","q1":"原因薬：コリンエステラーゼ阻害薬によるアセチルコリン増加→消化管ムスカリン受容体刺激→腸蠕動亢進→悪心・嘔吐・下痢。リバスチグミン（パッチ含む）で比較的多い。","q2":"観察ポイント：下痢・悪心の程度と頻度・食事摂取量・体重・脱水徴候・服薬方法（パッチか経口か）・貼付部位の皮膚状態（パッチ）","q3":"主な副作用：コリンエステラーゼ阻害薬→悪心・嘔吐・下痢・食欲低下・徐脈・失神・筋けいれん（コリン作動性副作用全般）"}]},{"id":"gastro","label":"⑤ 消化器","color":"#C0671A","accent":"#F4A261","bg":"#FFF4E8","icon":"🫁","cases":[{"id":1,"symptom":"NSAIDs使用後、胃痛","disease":"NSAIDs潰瘍/胃粘膜障害","drug":"非ステロイド系抗炎症薬（ロキソプロフェン・ジクロフェナク・イブプロフェン）","q1":"原因薬：NSAIDsによるCOX-1阻害→プロスタグランジン産生低下→胃粘膜保護作用低下→胃粘膜障害・潰瘍。アスピリンも同様。","q2":"観察ポイント：胃痛の部位・性状・食事との関係・黒色便・吐血・Hb値・H.pylori感染・PPI/ミソプロストール併用の有無","q3":"主な副作用：NSAIDs→胃粘膜障害・消化管潰瘍・腎機能障害・血小板機能抑制 ※PPI予防投与が推奨される（特に高齢者・ステロイド併用）"},{"id":2,"symptom":"PPI使用中、下痢","disease":"PPI使用中（長期）","drug":"プロトンポンプ阻害薬（オメプラゾール・ランソプラゾール・エソメプラゾール）","q1":"原因薬：PPI長期使用による胃内pH上昇→腸内細菌叢変化→Clostridium difficile感染リスク増大→下痢。また小腸での吸収変化も下痢の原因となる。","q2":"観察ポイント：下痢の性状・回数・腹痛・発熱（CDI の疑い）・抗菌薬の併用歴・CD毒素検査・長期PPI使用の必要性再評価","q3":"主な副作用：PPI長期使用→C.difficile感染リスク・低Mg血症・低Ca・骨折リスク・腎障害（稀）・ビタミンB12欠乏"},{"id":3,"symptom":"便秘患者、センノシド使用","disease":"便秘症","drug":"大腸刺激性下剤（センノシド：プルゼニド）","q1":"原因薬：センノシドは大腸刺激性下剤で腸管を刺激し蠕動を促進する。長期連用で耐性形成・電解質異常（低K）・大腸メラノーシス（色素沈着）を来す。","q2":"観察ポイント：排便の頻度・性状・腹痛（過剰刺激）・K値・長期使用の場合は大腸内視鏡での確認・依存性形成の有無","q3":"主な副作用：センノシド→腹痛・低K血症・大腸メラノーシス（長期）・依存性 / 過剰使用は下痢・電解質異常"},{"id":4,"symptom":"便秘患者、下痢","disease":"便秘治療中（下剤過剰）","drug":"下剤全般（センノシド・マグネシウム・ルビプロストン）","q1":"原因薬：下剤過量投与による過剰な下痢。マグネシウム製剤は腎機能低下患者では高Mg血症を来すリスクがある。","q2":"観察ポイント：排便回数・性状・水様下痢の有無・腹痛・脱水徴候（電解質・尿量・血圧）・Mg値（腎機能低下患者）","q3":"主な副作用：マグネシウム製剤→高Mg血症（腎機能低下患者）・下痢 / センノシド過量→腹痛・下痢・低K / ルビプロストン→悪心・下痢"},{"id":5,"symptom":"モサプリド使用後、腹痛","disease":"胃食道逆流症/胃排泄遅延","drug":"消化管運動改善薬（モサプリド：ガスモチン）","q1":"原因薬：モサプリドは5-HT4受容体刺激で消化管運動を促進するが、過度な蠕動亢進で腹痛・下痢を来すことがある。","q2":"観察ポイント：腹痛の部位・性状・下痢の有無・悪心・服薬タイミング・食事との関係","q3":"主な副作用：モサプリド→腹痛・下痢・口渇・倦怠感（比較的副作用少ない）/ QT延長（稀）"},{"id":6,"symptom":"ルビプロストン使用後、悪心","disease":"慢性便秘症（ルビプロストン療法）","drug":"クロライドチャネル作動薬（ルビプロストン：アミティーザ）","q1":"原因薬：ルビプロストンによる腸管内腔へのCl⁻・水分分泌促進→悪心・嘔吐。食後に服薬することで悪心を軽減できる。特に初期に多い。","q2":"観察ポイント：悪心の程度・服薬タイミング（食前後）・食事摂取量・体重変化・排便状況（改善の確認）","q3":"主な副作用：ルビプロストン→悪心（最多）・下痢・腹痛 / 妊婦禁忌（子宮収縮作用）"},{"id":7,"symptom":"NSAIDs使用後、黒色便","disease":"NSAIDs潰瘍による消化管出血","drug":"NSAIDs（ロキソプロフェン・アスピリン）","q1":"原因薬：NSAIDsによる胃・十二指腸潰瘍からの出血が黒色便（タール便）として現れる。上部消化管出血のサイン。","q2":"観察ポイント：便の色・性状（タール便・血便）・吐血・Hb低下・血圧・脈拍（失血性ショックの除外）・腹痛・NSAIDs服薬歴","q3":"主な副作用：NSAIDs→消化管出血・潰瘍 ※緊急内視鏡の適応。PPIで予防・治療 / アスピリン→消化管出血（低用量でも出血リスクあり）"},{"id":8,"symptom":"PPI長期使用、低Mg","disease":"PPI長期使用による低マグネシウム血症","drug":"プロトンポンプ阻害薬（長期使用）","q1":"原因薬：PPI長期使用による小腸でのMg吸収阻害→低Mg血症。通常3ヶ月以上の使用で出現。低Mg→低Ca・低Kも合併することがある。","q2":"観察ポイント：Mg値（正常0.7〜1.1mmol/L）・筋けいれん・テタニー・不整脈・PPI使用期間・必要性の再評価","q3":"主な副作用：PPI長期→低Mg・低Ca・骨折リスク（骨密度低下）・CDI・低B12 ※PPI中止でMg改善するが再開すると再発"},{"id":9,"symptom":"便秘患者、腹部膨満","disease":"慢性便秘症/イレウス","drug":"下剤選択・治療薬見直し","q1":"原因薬：抗コリン薬（抗精神病薬・抗うつ薬・抗パーキンソン薬）・オピオイド・Ca拮抗薬による腸管蠕動低下が便秘→腸管ガス貯留→腹部膨満を来す。","q2":"観察ポイント：腸蠕動音（亢進/減弱/消失）・腹部X線（ガス像・便塊）・腹痛・嘔気・発熱・最終排便日時","q3":"主な副作用：オピオイド→便秘（予防的下剤投与が標準）/ 抗コリン薬→腸管麻痺 / Ca拮抗薬（非DHP系）→便秘 / クロザピン→腸閉塞"},{"id":10,"symptom":"下痢患者、脱水","disease":"急性下痢症/薬剤性下痢","drug":"補液療法（経口・点滴）","q1":"原因薬：抗菌薬・メトホルミン・ルビプロストン・PPI・GLP-1受容体作動薬などによる下痢が原因で脱水となる場合がある。高齢者では重篤化しやすい。","q2":"観察ポイント：尿量（<400mL/日は乏尿）・皮膚ツルゴール・口腔粘膜・血圧・脈拍（頻脈）・電解質（Na・K・Cl）・BUN/Cr比・意識レベル","q3":"主な副作用：下痢を引き起こす薬剤全般が脱水の原因となる / 特に高齢者・腎機能低下患者では急速に重症化"},{"id":11,"symptom":"NSAIDs使用後、腎機能低下","disease":"NSAIDs腎症/急性腎障害","drug":"NSAIDs（ロキソプロフェン・インドメタシン・ジクロフェナク）","q1":"原因薬：NSAIDsによるCOX阻害→プロスタグランジン低下→腎血管収縮→腎血流低下→急性腎障害。特に脱水・心不全・高齢者・利尿薬使用患者でリスク高い。","q2":"観察ポイント：Cr・BUN・eGFR・尿量・浮腫・血圧・使用量・期間・他の腎毒性薬の併用・水分摂取量","q3":"主な副作用：NSAIDs→急性腎障害・高K血症・Na/水分貯留・高血圧悪化 ※腎機能低下患者・脱水状態では原則禁忌"},{"id":12,"symptom":"消化管出血","disease":"消化管出血（薬剤性）","drug":"NSAIDs・抗血小板薬・抗凝固薬・ステロイド","q1":"原因薬：NSAIDs/アスピリン→胃・十二指腸粘膜障害。抗血小板薬/抗凝固薬→止血機能低下。ステロイドもNSAIDsと併用で潰瘍リスク大幅増加。","q2":"観察ポイント：吐血・下血（黒色便・血便）・Hb低下・血圧低下・頻脈・ショック徴候・服薬歴（抗凝固薬のINR・DOAC服薬確認）","q3":"主な副作用：NSAIDs→消化管潰瘍・出血 / ワルファリン→出血（PT-INR管理）/ DOAC→消化管出血（特にダビガトラン・リバーロキサバン）"},{"id":13,"symptom":"制吐薬使用後、眠気","disease":"悪心・嘔吐（制吐薬療法）","drug":"ドパミン拮抗薬（メトクロプラミド：プリンペラン）・抗ヒスタミン薬（ジフェンヒドラミン）","q1":"原因薬：メトクロプラミドの中枢ドパミン受容体遮断→眠気・錐体外路症状。抗ヒスタミン系制吐薬の中枢H1遮断→強い眠気。","q2":"観察ポイント：眠気の程度・錐体外路症状（ジストニア・アカシジア）・投与量・高齢者への使用・運転への影響","q3":"主な副作用：メトクロプラミド→眠気・錐体外路症状（特に高齢者・長期使用）・高プロラクチン血症 / 抗ヒスタミン→眠気・口渇・尿閉"},{"id":14,"symptom":"胃潰瘍患者、腹痛","disease":"胃・十二指腸潰瘍（再燃/薬剤性）","drug":"PPI（オメプラゾール）・H₂ブロッカー（ファモチジン）・アルギン酸塩","q1":"原因薬：PPI/H₂ブロッカーが十分使用されていない場合の治療不足。または治療中でもNSAIDs・アスピリン・ステロイド・アルコールが潰瘍を悪化させる。","q2":"観察ポイント：腹痛の部位・時期（空腹時/食後）・黒色便・Hb値・服薬コンプライアンス・NSAIDs等の誘発薬物・H.pylori治療の有無","q3":"主な副作用：H₂ブロッカー→頭痛・めまい（特にシメチジンはCYP阻害による多剤相互作用）/ PPI長期→低Mg・骨粗鬆症・CDI"},{"id":15,"symptom":"下痢患者、電解質異常","disease":"急性/慢性下痢による電解質喪失","drug":"補液・電解質補充","q1":"原因薬：重症下痢（抗菌薬関連・CDI・GLP-1作動薬・ルビプロストン等）による腸管からの電解質喪失。特にK・Na・Mg・Clの喪失に注意。","q2":"観察ポイント：Na・K・Cl・Mg値・心電図（低K：T波変化）・筋力・腸蠕動・意識レベル・下痢の原因薬の特定","q3":"主な副作用：下痢による電解質異常→低K（不整脈リスク）・低Na（意識障害）・低Mg / 特に心疾患患者では低Kが重篤な不整脈を誘発"}]},{"id":"infection","label":"⑥ 感染症","color":"#007A5E","accent":"#06D6A0","bg":"#E6FAF5","icon":"🦠","cases":[{"id":1,"symptom":"抗菌薬使用後、発疹","disease":"薬剤アレルギー性皮疹","drug":"ペニシリン系・セフェム系・ST合剤・フルオロキノロン系","q1":"原因薬：ペニシリン系は最も頻度の高いアレルギー原因薬。ST合剤はSJS/TENの原因として重要。セフェム系とペニシリン系は約10%の交差アレルギー。","q2":"観察ポイント：発疹の性状・分布・粘膜症状・発熱・SJS徴候・アナフィラキシー徴候（血圧・SpO₂・喉頭浮腫）・アレルギー歴","q3":"主な副作用：ペニシリン系→アナフィラキシー・蕁麻疹・薬疹 / ST合剤→SJS/TEN（重症）/ セフェム系→交差アレルギー ※アレルギー歴は必ず確認"},{"id":2,"symptom":"抗菌薬使用後、下痢","disease":"抗菌薬関連下痢症/CDI","drug":"クリンダマイシン・フルオロキノロン・カルバペネム・広域セフェム","q1":"原因薬：広域抗菌薬が腸内細菌叢を撹乱しC.difficileが増殖・毒素産生→偽膜性腸炎。クリンダマイシン・フルオロキノロンは特に高リスク。","q2":"観察ポイント：下痢の性状・回数・腹痛・発熱・白血球数・CD毒素（GDH/毒素テスト）・腹部CT（腸壁肥厚）","q3":"主な副作用：広域抗菌薬→CDI（バンコマイシン/メトロニダゾール経口で治療）・電解質異常 / フルオロキノロン→CDIリスク高・QT延長"},{"id":3,"symptom":"抗菌薬使用後、腎機能低下","disease":"薬剤性腎障害","drug":"アミノグリコシド系（ゲンタマイシン）・バンコマイシン・βラクタム系（高用量）","q1":"原因薬：アミノグリコシド系は近位尿細管に蓄積し腎毒性を発揮。バンコマイシンも腎毒性あり。両者の併用はリスク倍増。TDM（血中濃度測定）が必須。","q2":"観察ポイント：Cr・BUN・eGFR・尿量・血中薬物濃度（TDM）・水分バランス・体重・脱水の有無","q3":"主な副作用：アミノグリコシド→腎毒性（可逆性）・聴神経毒性（不可逆・難聴・めまい）/ バンコマイシン→腎毒性 ※AUCガイドTDMが推奨"},{"id":4,"symptom":"抗菌薬使用後、肝機能上昇","disease":"薬剤性肝障害","drug":"マクロライド系（クラリスロマイシン）・フルオロキノロン系・テトラサイクリン系・イソニアジド（抗結核薬）","q1":"原因薬：クラリスロマイシンはCYP3A4阻害と肝代謝の影響で肝機能障害を来す。抗結核薬（イソニアジド・リファンピシン）も肝毒性が強い。","q2":"観察ポイント：ALT・AST・ALP・γ-GTP・ビリルビン・黄疸・掻痒感・倦怠感・尿色・抗菌薬の種類と使用期間","q3":"主な副作用：マクロライド→肝障害・QT延長・胃腸障害 / フルオロキノロン→肝障害・腱断裂 / 抗結核薬（イソニアジド・リファンピシン）→重症肝障害"},{"id":5,"symptom":"抗菌薬使用後、アナフィラキシー","disease":"アナフィラキシーショック（抗菌薬アレルギー）","drug":"ペニシリン系（最多）・セフェム系・スルファ薬・フルオロキノロン系","q1":"原因薬：ペニシリン系によるIgE介在性アナフィラキシーが最も多い。アレルギー歴の確認（アレルギー歴がある場合は代替薬使用）。投与開始後15〜30分以内に注意。","q2":"観察ポイント：皮膚（蕁麻疹・発赤）・呼吸（喘鳴・喉頭浮腫）・血圧・脈拍・SpO₂・意識レベル・消化器症状（悪心・嘔吐）・投与開始からの時間","q3":"主な副作用：ペニシリン系→アナフィラキシー（アドレナリン筋注が第一選択）/ 治療：アドレナリン0.3mg筋注・輸液・酸素・ステロイド"},{"id":6,"symptom":"抗菌薬使用後、口腔カンジダ","disease":"口腔カンジダ症（菌交代症）","drug":"広域抗菌薬・フルオロキノロン系・クリンダマイシン（+免疫抑制状態）","q1":"原因薬：広域抗菌薬による常在細菌の抑制→Candida albicansの過剰増殖→口腔カンジダ症。ステロイド・免疫抑制剤使用中はさらにリスク高い。","q2":"観察ポイント：口腔内の白苔（拭うと出血）・咽頭痛・嚥下困難・食欲低下・発熱・HIV等の免疫状態・ステロイド使用の有無","q3":"主な副作用：広域抗菌薬→菌交代症（カンジダ・CDI）/ 治療：フルコナゾール経口またはミカファンギン静注 / 吸入ステロイドの場合はうがいで予防"},{"id":7,"symptom":"抗菌薬使用後、悪心","disease":"薬剤性消化器症状","drug":"マクロライド系（アジスロマイシン・クラリスロマイシン）・メトロニダゾール・テトラサイクリン系","q1":"原因薬：マクロライド系はモチリン受容体刺激による胃腸運動亢進→悪心・腹痛。メトロニダゾールも強い消化器副作用がある。食後服用で軽減可能。","q2":"観察ポイント：悪心の程度・服薬タイミング（食前後）・嘔吐の有無・食事摂取量・脱水徴候・継続可能かの判断","q3":"主な副作用：マクロライド系→悪心・腹痛・下痢・QT延長（アジスロマイシン）/ メトロニダゾール→悪心・金属味・アルコールとの相互作用（ジスルフィラム様）"},{"id":8,"symptom":"抗菌薬使用後、嘔吐","disease":"薬剤性嘔吐/消化器症状","drug":"テトラサイクリン系（ミノサイクリン）・メトロニダゾール・フルオロキノロン系","q1":"原因薬：ミノサイクリンは消化器副作用が強く（前庭毒性によるめまい・悪心も含む）、特に若年女性でのめまい・悪心・嘔吐が多い。食後服用・投与量調整で対応。","q2":"観察ポイント：嘔吐の回数・量・性状・脱水徴候・電解質・服薬継続可否・ミノサイクリンの場合はめまいも確認","q3":"主な副作用：ミノサイクリン→悪心・嘔吐・めまい（前庭毒性）・光過敏・歯の着色（小児禁忌）/ メトロニダゾール→悪心・金属味"},{"id":9,"symptom":"抗菌薬使用後、頭痛","disease":"薬剤性頭痛/中枢神経系副作用","drug":"フルオロキノロン系（シプロフロキサシン・レボフロキサシン）・メトロニダゾール","q1":"原因薬：フルオロキノロン系はGABA-A受容体阻害による中枢神経系副作用（頭痛・めまい・不眠・まれにけいれん）を来す。特にNSAIDsや茶のフィロキサンチンとの相互作用で増強される。","q2":"観察ポイント：頭痛の性状・程度・めまい・不眠・けいれん（稀）・他の中枢神経系症状・服薬歴とタイミング","q3":"主な副作用：フルオロキノロン→頭痛・めまい・不眠・QT延長・腱断裂（特に高齢者・ステロイド併用）/ メトロニダゾール→頭痛・末梢神経障害（長期）"},{"id":10,"symptom":"抗菌薬使用後、倦怠感","disease":"薬剤性倦怠感/Jarisch-Herxheimer反応","drug":"抗菌薬全般（特に梅毒・ライム病治療開始時）","q1":"原因薬：抗菌薬開始後の細菌大量死滅による内毒素放出→発熱・倦怠感・頭痛（Jarisch-Herxheimer反応）。また薬剤性肝障害・腎障害に伴う倦怠感も鑑別。","q2":"観察ポイント：倦怠感のタイミング・発熱・肝腎機能・血液検査（WBC・CRP）・皮疹・投与開始からの時期・菌血症との鑑別","q3":"主な副作用：抗菌薬全般→倦怠感・発熱（薬剤熱・J-H反応）/ 薬剤熱：他の感染症状なく38〜39℃台の発熱と皮疹 / J-H反応：ペニシリン投与後数時間以内"}]},{"id":"emergency","label":"⑦ 救急","color":"#C44B0A","accent":"#FF6B35","bg":"#FFF1EB","icon":"🚨","cases":[{"id":1,"symptom":"アナフィラキシーショック","disease":"アナフィラキシーショック（重篤）","drug":"アドレナリン（エピネフリン）0.3mg筋注・抗ヒスタミン薬・ステロイド・輸液","q1":"原因薬：ペニシリン系・造影剤・NSAIDs・食物（ナッツ・甲殻類）・ハチ毒などが誘因。アドレナリン筋注（大腿外側）が第一選択。躊躇なく投与する。","q2":"観察ポイント：皮膚（蕁麻疹・血管浮腫）・気道（喘鳴・喉頭浮腫→嗄声）・血圧・SpO₂・意識・消化器症状・投与後の改善確認（5〜15分で再評価）","q3":"治療薬の副作用：アドレナリン→頻脈・高血圧・振戦（必要なら受容できる副作用）/ ステロイド→血糖上昇（重症例では許容）/ H1ブロッカー→眠気"},{"id":2,"symptom":"オピオイド過量","disease":"オピオイド中毒/過量投与","drug":"ナロキソン（オピオイド拮抗薬）0.4〜2mg IV/IM","q1":"原因薬：モルヒネ・オキシコドン・フェンタニルの過量→呼吸抑制・意識障害・縮瞳（三徴）。ナロキソンで拮抗するが半減期が短く再鎮静に注意。","q2":"観察ポイント：呼吸数（<12/分）・SpO₂・意識レベル・縮瞳・服薬歴・鎮痛薬の種類・最終服薬量と時刻・ナロキソン投与後の反応","q3":"治療薬の副作用：ナロキソン→急性離脱症状（疼痛出現・高血圧・頻脈）・作用時間短い（30〜90分）→再評価必要 ※過量ナロキソンは離脱症状を引き起こす"},{"id":3,"symptom":"ベンゾジアゼピン過量","disease":"BZD中毒/過量服用","drug":"フルマゼニル（BZD拮抗薬）・気道確保・補助換気","q1":"原因薬：ジアゼパム・アルプラゾラムなど。GABA-A受容体の過剰刺激→深い鎮静・筋弛緩・呼吸抑制。アルコール・オピオイドとの複合摂取で特に重篤。","q2":"観察ポイント：意識レベル（GCS）・呼吸数・SpO₂・血圧・筋緊張・服薬歴と量・アルコール・他の薬物との複合摂取確認","q3":"治療薬の副作用：フルマゼニル→作用時間短い（BZDより短い→再鎮静に注意）・BZD依存患者では離脱けいれんを誘発 ※てんかん患者への投与は慎重"},{"id":4,"symptom":"低血糖発作","disease":"低血糖（薬剤性）","drug":"50%ブドウ糖液20〜40mL IV（意識ない場合）・グルカゴン1mg筋注・10%ブドウ糖液点滴","q1":"原因薬：インスリン・SU薬（グリメピリド・グリクラジド）による過剰降糖。β遮断薬は低血糖症状（動悸・振戦）をマスクするため発見が遅れることがある。","q2":"観察ポイント：血糖値（<70mg/dL）・意識レベル・発汗・振戦・動悸・ブドウ糖投与後の血糖と意識の改善・投与薬の種類（SU薬は作用時間が長い）","q3":"治療薬の副作用：高濃度ブドウ糖→血管刺激（末梢投与に注意）/ グルカゴン→悪心・嘔吐 ※SU薬による低血糖は遷延するため入院観察が必要"},{"id":5,"symptom":"高K血症","disease":"高カリウム血症（緊急）","drug":"10%グルコン酸Ca・インスリン+ブドウ糖・重曹・陽イオン交換樹脂・透析","q1":"原因薬：ACE阻害薬/ARB（アルドステロン抑制）・カリウム保持性利尿薬（スピロノラクトン）・NSAIDs・TMP（ST合剤）・ジギタリス中毒。","q2":"観察ポイント：K値（>6.0mEq/Lは緊急）・心電図（テント状T波→QRS幅広→サイン波形→心停止）・筋力低下・感覚異常・尿量・腎機能","q3":"治療薬の副作用：グルコン酸Ca→徐脈（急速投与）/ インスリン→低血糖（ブドウ糖と同時投与）/ 透析→低血圧 ※Ca投与は心毒性保護（K値は下がらない）"},{"id":6,"symptom":"けいれん発作","disease":"てんかん重積/薬剤誘発性けいれん","drug":"ジアゼパム10mg IV・ロラゼパム4mg IV・フェニトイン・レベチラセタム","q1":"原因薬：てんかん薬の急な中断（離脱けいれん）・フルオロキノロン（GABA遮断）・テオフィリン中毒・イミペネム・ナロキソン（BZD依存患者）・低血糖も原因。","q2":"観察ポイント：発作の持続時間・形式（全身性/焦点性）・血糖・電解質・体温・服薬歴・最終服薬確認・気道確保・舌咬傷・転落防止","q3":"治療薬の副作用：ジアゼパム/ロラゼパム→呼吸抑制（特に静注速度に注意）/ フェニトイン→低血圧・不整脈（急速IV）/ BZDの急な中止→離脱けいれん"},{"id":7,"symptom":"急性喘息発作","disease":"重症喘息発作（生命の危機）","drug":"吸入SABA（サルブタモール）・全身ステロイド・硫酸Mg・ヘリオックス・気管挿管","q1":"原因薬：NSAIDs/アスピリン誘発性喘息・β遮断薬による気管支収縮。また吸入ICSの不適切使用（手技不良）が予防に失敗し重症化を招く。","q2":"観察ポイント：SpO₂・呼吸数・silent chest（呼吸音消失は重篤）・呼気CO₂・意識・SABAへの反応・PEFR・血液ガス（高CO₂は挿管サイン）","q3":"治療薬の副作用：SABA（大量）→低K・頻脈 / 全身ステロイド→高血糖・不眠 / 硫酸Mg→低血圧・悪心 ※β遮断薬は絶対禁忌"},{"id":8,"symptom":"心停止","disease":"心停止（VF/PVT/PEA/Asystole）","drug":"アドレナリン1mg IV（3〜5分毎）・アミオダロン300mg IV（VF/PVT）・重曹・Ca","q1":"原因薬：心停止の可逆的原因（4H4T）を確認。低K/高K・低Mg（薬剤性）・薬物中毒（TCА・オピオイド・局所麻酔薬）・テンポナーデ（抗凝固薬過剰）。","q2":"観察ポイント：胸骨圧迫の質（深さ5〜6cm・テンポ100〜120/分）・除細動適応（VF/PVT）・ETCO₂（CPR効果の指標）・可逆的原因の検索","q3":"治療薬の副作用：アドレナリン→ROSC後の高血圧・不整脈 / アミオダロン→低血圧・QT延長 ※ROSC後の管理（目標体温管理・再灌流療法）が重要"},{"id":9,"symptom":"重症脱水","disease":"重症脱水（等張性/高張性）","drug":"生理食塩水（等張）・乳酸リンゲル液・経口補水液（軽症）","q1":"原因薬：利尿薬（フロセミド）・SGLT2阻害薬・下剤（過剰）・リチウム（腎性尿崩症）による過剰水分喪失が原因となりうる。","q2":"観察ポイント：皮膚ツルゴール・口腔粘膜・尿量・血圧・脈拍・BUN/Cr比・尿浸透圧・尿比重・電解質・意識レベル（高Na→中枢神経症状）","q3":"治療薬の副作用：急速輸液→肺水腫（心機能低下患者）・血清Na急速補正→脳浮腫（高Na補正は緩徐に：0.5〜1mEq/L/h以内） ※過剰補正は有害"},{"id":10,"symptom":"敗血症疑い","disease":"敗血症/敗血症性ショック","drug":"広域抗菌薬（1時間以内）・輸液蘇生・昇圧薬（ノルアドレナリン）","q1":"原因薬：免疫抑制薬（ステロイド・生物学的製剤・化学療法）使用中の患者は感染リスクが高く敗血症に進展しやすい。また抗菌薬の不適切使用による耐性菌感染症。","q2":"観察ポイント：qSOFA（意識変化・呼吸数≥22・収縮期血圧≤100mmHg）・体温（高熱または低体温）・乳酸値・血液培養（抗菌薬前に）・臓器障害評価","q3":"治療薬の副作用：ノルアドレナリン→末梢虚血・頻脈・高血圧 / 大量輸液→肺水腫・コンパートメント症候群 / 広域抗菌薬→CDI・薬剤耐性化"}]},{"id":"anticholinergic","label":"⑧ 抗コリン薬","color":"#8B5E3C","accent":"#C49A6C","bg":"#FDF6EE","icon":"🧪","cases":[{"id":1,"symptom":"口渇・唾液分泌低下","disease":"抗コリン薬による唾液腺抑制","drug":"アトロピン・スコポラミン・抗ヒスタミン薬（ジフェンヒドラミン）・三環系抗うつ薬・抗精神病薬（低力価）・チオトロピウム・オキシブチニン","q1":"原因薬：ムスカリンM3受容体遮断により外分泌腺（唾液腺・涙腺）の分泌が抑制される。抗コリン作用を持つ薬剤全般が原因となりうる。特に多剤併用（抗コリン薬の重複）で症状が強くなる。","q2":"観察ポイント：口腔内乾燥の程度・齲歯リスク（唾液減少）・水分摂取量・抗コリン薬の重複確認（Anticholinergic Cognitive Burden Scaleで評価）・口腔ケアの状況・スワブテスト","q3":"主な副作用：抗コリン薬全般→口渇（最多・用量依存性）・口腔カンジダリスク増大・嚥下困難 ※高齢者では虫歯・口臭・嚥下障害のリスク増大"},{"id":2,"symptom":"尿閉・排尿困難","disease":"抗コリン薬による膀胱排尿筋抑制","drug":"アトロピン・オキシブチニン（過活動膀胱薬）・ソリフェナシン・トルテロジン・三環系抗うつ薬・抗精神病薬","q1":"原因薬：ムスカリンM2/M3受容体遮断により膀胱排尿筋が弛緩し排尿困難・尿閉を来す。前立腺肥大を合併した高齢男性では特にリスクが高い。","q2":"観察ポイント：排尿の有無・尿量（<400mL/日は乏尿）・残尿感・下腹部膨満・膀胱スキャンによる残尿測定・前立腺肥大の既往確認・導尿の必要性判断","q3":"主な副作用：過活動膀胱治療薬（オキシブチニン・ソリフェナシン）→尿閉・口渇・便秘・認知機能低下（特に高齢者で中枢移行性の高いオキシブチニンに注意）"},{"id":3,"symptom":"便秘・腸管麻痺","disease":"抗コリン薬による腸管蠕動低下","drug":"抗コリン薬全般・三環系抗うつ薬・クロザピン・低力価抗精神病薬（クロルプロマジン）","q1":"原因薬：ムスカリンM3受容体遮断により腸管平滑筋が弛緩→腸蠕動低下→便秘。クロザピンは最も強い抗コリン作用を持ち、放置すると腸閉塞（致死的）に至る可能性がある。","q2":"観察ポイント：排便の頻度・最終排便日・腸蠕動音・腹部膨満・腹痛（腸閉塞の除外）・腹部X線（便塊・ガス像）・水分摂取量・活動量","q3":"主な副作用：クロザピン→重篤な便秘・腸閉塞（死亡例あり・定期的な排便確認が必須）/ 三環系抗うつ薬→便秘・腹部膨満 ※オピオイドとの併用でリスク倍増"},{"id":4,"symptom":"頻脈・動悸","disease":"抗コリン薬による洞結節刺激亢進","drug":"アトロピン・スコポラミン・ブチルスコポラミン（ブスコパン）・イプラトロピウム（全身吸収）","q1":"原因薬：ムスカリンM2受容体遮断により洞結節への迷走神経抑制が解除→心拍数増加。アトロピン静注では著明な頻脈となる（治療的に徐脈に使用）。","q2":"観察ポイント：脈拍数・心電図（洞性頻脈）・血圧・患者の自覚症状（動悸・胸部不快感）・投与量と投与経路（静注は特に注意）・基礎心疾患の確認","q3":"主な副作用：アトロピン→頻脈・心室細動（過量）・散瞳・口渇 / ブスコパン→頻脈・めまい / 吸入抗コリン薬→全身吸収少ないが高用量で頻脈"},{"id":5,"symptom":"散瞳・羞明・視力障害","disease":"抗コリン薬による瞳孔散大・毛様体筋麻痺","drug":"アトロピン点眼・トロピカミド（散瞳薬）・スコポラミン・全身投与抗コリン薬","q1":"原因薬：ムスカリンM3受容体遮断により瞳孔括約筋が弛緩→散瞳。同時に毛様体筋麻痺による調節障害（近見困難）が起きる。閉塞隅角緑内障患者では眼圧上昇（急性発作）の危険がある。","q2":"観察ポイント：瞳孔径・羞明の有無・視力変化・眼痛・頭痛（緑内障発作の徴候）・閉塞隅角緑内障の既往・眼圧測定（必要時）","q3":"主な副作用：散瞳薬→散瞳・調節麻痺・眼圧上昇（閉塞隅角緑内障患者は禁忌）/ 全身抗コリン薬→同様の眼症状（点眼より軽度）"},{"id":6,"symptom":"認知機能低下・せん妄","disease":"抗コリン薬による中枢神経症状（特に高齢者）","drug":"ジフェンヒドラミン（レスタミン）・低力価抗精神病薬・三環系抗うつ薬・オキシブチニン・H2ブロッカー（シメチジン）","q1":"原因薬：中枢ムスカリン受容体遮断により記憶・認知機能が障害される。高齢者は血液脳関門の透過性が高く中枢移行しやすい薬剤（ジフェンヒドラミン・オキシブチニン）で特にリスク高い。","q2":"観察ポイント：認知機能（MMSEや見当識の変化）・せん妄の評価（CAM）・記憶障害・時間・場所の見当識・服薬歴（Anticholinergic Burden Score）・夜間の不穏・転倒歴","q3":"主な副作用：ジフェンヒドラミン→強い中枢性抗コリン作用・認知機能低下・せん妄 ※ビアーズ基準で高齢者に推奨されない薬剤 / 抗コリン薬の長期使用は認知症リスク増加の報告あり"},{"id":7,"symptom":"発汗低下・体温上昇","disease":"抗コリン薬による体温調節障害","drug":"アトロピン・スコポラミン・ジフェンヒドラミン・フェノチアジン系抗精神病薬（クロルプロマジン）","q1":"原因薬：ムスカリンM3受容体遮断により汗腺分泌が抑制→発汗停止→体温放散不能→体温上昇（高体温・熱中症リスク）。夏季・高温環境での使用は特に危険。","q2":"観察ポイント：体温・発汗の有無・皮膚乾燥（乾いた皮膚は抗コリン中毒の特徴）・環境温度・水分摂取量・尿量・意識レベル（熱中症重症化の徴候）","q3":"主な副作用：抗コリン薬→発汗停止・高体温・熱中症（特に夏季・労働環境） ※抗コリン中毒の古典的3徴：「Hot as a hare, Dry as a bone, Red as a beet」（高熱・乾燥・紅潮）"},{"id":8,"symptom":"過活動膀胱治療中、認知症様症状","disease":"抗コリン薬（過活動膀胱治療薬）による認知機能障害","drug":"オキシブチニン（ポラキス）・ソリフェナシン（ベシケア）・トルテロジン（デトルシトール）","q1":"原因薬：過活動膀胱治療に用いる抗コリン薬のうち、特にオキシブチニンは中枢移行性が高くアセチルコリン産生ニューロンを抑制→記憶・認知機能低下・せん妄。β3作動薬（ミラベグロン）への切り替えで改善できる。","q2":"観察ポイント：認知機能の変化（服薬前後での比較）・せん妄・夜間不穏・MMSE/HDS-R・服薬開始時期との関連・他の抗コリン薬との重複","q3":"主な副作用：オキシブチニン→認知機能低下（最も中枢移行性が高い）・口渇・便秘・尿閉 / ソリフェナシン→比較的中枢移行少ない / 代替：ミラベグロン（β3作動薬）は抗コリン作用なし"},{"id":9,"symptom":"術前投与後、低体温＋口渇","disease":"術前抗コリン薬投与後の副作用","drug":"アトロピン硫酸塩（術前投与）・スコポラミン（麻酔前投薬）","q1":"原因薬：術前のアトロピン投与（麻酔中の迷走神経反射予防・気道分泌抑制目的）により全身性抗コリン作用が出現。口渇・発汗停止・頻脈・散瞳が典型的。","q2":"観察ポイント：口渇・発汗の有無・脈拍数・瞳孔径・体温・尿量・術中の心拍数変化・フルマゼニル準備（スコポラミンのベンゾジアゼピン様作用に備え）","q3":"主な副作用：アトロピン術前投与→頻脈・口渇・散瞳・発汗低下・低体温（環境によっては高体温）/ スコポラミン→鎮静・健忘（治療的）・口渇・散瞳"},{"id":10,"symptom":"抗コリン薬中毒の疑い（複数症状の重複）","disease":"抗コリン薬中毒（過量・蓄積）","drug":"アトロピン・スコポラミン・ジフェンヒドラミン・三環系抗うつ薬・抗精神病薬複数重複","q1":"原因薬：抗コリン作用を持つ複数薬剤の重複投与（多剤併用・ポリファーマシー）により抗コリン作用が蓄積して中毒症状が出現。高齢者では低用量でも中毒になりやすい。","q2":"観察ポイント：抗コリン中毒の徴候【中枢】意識障害・せん妄・幻覚・けいれん【末梢】散瞳・皮膚紅潮・乾燥・頻脈・体温上昇・尿閉・腸蠕動低下 ／ 服薬している全薬剤の抗コリン作用を評価（Anticholinergic Burden Scale）","q3":"主な副作用と治療：重篤な抗コリン中毒→フィゾスチグミン（コリンエステラーゼ阻害薬）による拮抗 / 対症療法（冷却・輸液・尿道カテーテル）/ TCA中毒では重炭酸Na投与（心毒性対策）"},{"id":11,"symptom":"眼圧上昇・眼痛（急性）","disease":"抗コリン薬による急性閉塞隅角緑内障発作誘発","drug":"散瞳薬（トロピカミド・アトロピン点眼）・全身性抗コリン薬・抗うつ薬・抗精神病薬","q1":"原因薬：散瞳により虹彩が肥厚し隅角が閉塞→房水流出障害→急激な眼圧上昇→急性緑内障発作。閉塞隅角緑内障の既往・浅前房（遠視体型）の患者では特に危険。","q2":"観察ポイント：突然の眼痛・頭痛・霧視・虹輪視（光の輪）・悪心・嘔吐・角膜浮腫・眼圧測定（正常10〜21mmHg）・緑内障の既往確認・緊急眼科受診の必要性","q3":"主な副作用：散瞳薬→急性閉塞隅角緑内障発作（眼科的緊急事態・失明リスク）/ 全身性抗コリン薬→開放隅角緑内障には比較的安全だが閉塞隅角には禁忌 ※投薬前に緑内障の種類確認が必須"},{"id":12,"symptom":"気管支分泌低下・痰が出にくい","disease":"抗コリン薬による気道分泌抑制","drug":"アトロピン・スコポラミン・術前抗コリン薬・全身投与ブスコパン","q1":"原因薬：ムスカリンM3受容体遮断により気管支腺・唾液腺の分泌が抑制→気道粘液の粘稠度上昇→喀痰困難。特に高齢者・慢性気道疾患患者では肺炎リスクが増加する。","q2":"観察ポイント：喀痰の性状（粘稠・硬い痰）・SpO₂・呼吸音（分泌物貯留音）・咳嗽の有無と効果・水分摂取量・ネブライザー使用状況","q3":"主な副作用：全身性抗コリン薬→気道分泌減少・痰の粘稠化・無気肺リスク ※吸入抗コリン薬（チオトロピウム等）は局所作用主体で全身性気道分泌への影響は少ない"},{"id":13,"symptom":"術後せん妄（高齢患者）","disease":"術後抗コリン薬誘発性せん妄","drug":"スコポラミン・ジフェンヒドラミン（術後嘔気対策）・モルヒネ（抗コリン作用あり）・術前抗コリン薬","q1":"原因薬：術後に使用される複数の薬剤（スコポラミン・ジフェンヒドラミン・フェノチアジン系制吐薬）の抗コリン作用が重複し、高齢者の中枢コリン系を抑制→術後せん妄。","q2":"観察ポイント：CAM（Confusion Assessment Method）によるせん妄評価・意識の変動・見当識障害・幻覚・不穏・夜間の興奮・術前認知機能ベースライン・抗コリン薬の重複確認","q3":"主な副作用：抗コリン薬重複→術後せん妄・認知機能低下・転倒・誤嚥 ※高齢者の術後管理では抗コリン薬の使用を最小限に（スコポラミン→オンダンセトロンへ変更など）"},{"id":14,"symptom":"過活動膀胱薬開始後、便秘・口渇・頻脈が同時出現","disease":"抗コリン薬の複合的副作用（典型的抗コリン症状トリアス）","drug":"ソリフェナシン（ベシケア）・オキシブチニン（ポラキス）・イミダフェナシン（ウリトス）","q1":"原因薬：過活動膀胱治療薬の抗M3受容体遮断→膀胱（治療効果）・唾液腺（口渇）・腸管（便秘）への同時作用。心臓M2受容体遮断による頻脈も加わることがある。","q2":"観察ポイント：口渇・便秘・頻脈の三症状の確認・排尿状況の改善（治療効果）・副作用と効果のバランス評価・β3作動薬（ミラベグロン）への切り替え検討の判断","q3":"主な副作用：過活動膀胱治療薬→口渇・便秘・頻脈（抗コリン症状トリアス）・尿閉・認知機能低下（特にオキシブチニン） / ミラベグロン（代替）→高血圧・上気道炎（抗コリン作用なし）"},{"id":15,"symptom":"パーキンソン病患者、抗コリン薬投与後に症状悪化","disease":"パーキンソン病（抗コリン薬の有害な相互作用）","drug":"ドパミン遮断薬（メトクロプラミド・プリンペラン）・低力価抗精神病薬・抗コリン薬（一部はパーキンソン症状治療に使用）","q1":"原因薬：パーキンソン病では脳内ドパミン－アセチルコリンのバランスが崩れている。ドパミン遮断作用を持つ薬剤（メトクロプラミド・ハロペリドール）がパーキンソン症状を悪化させる。逆に抗コリン薬（トリヘキシフェニジル）はパーキンソン症状を改善する場合もある。","q2":"観察ポイント：振戦・筋固縮・無動・歩行障害の変化・飲水・嚥下困難の悪化・服薬変更との時間的関係・メトクロプラミドなどドパミン遮断薬の使用有無","q3":"主な副作用：メトクロプラミド→パーキンソン症状悪化（パーキンソン病患者に禁忌に近い）/ 低力価抗精神病薬→同様 / トリヘキシフェニジル（抗コリン抗パーキンソン薬）→口渇・便秘・尿閉・認知機能低下（高齢者には使いにくい）"}]}];

let currentCatId = null;
let currentCaseId = null;
let revealed = {};

function showHome() {
  hide('page-list'); hide('page-case'); show('page-home');
  window.scrollTo(0,0);
}
function showList(catId) {
  currentCatId = catId;
  const cat = CATEGORIES.find(c=>c.id===catId);
  hide('page-home'); hide('page-case'); show('page-list');
  document.getElementById('list-icon').textContent = cat.icon;
  document.getElementById('list-cat-name').textContent = cat.label;
  document.getElementById('list-cat-name').style.color = cat.color;
  document.getElementById('list-cat-sub').textContent = cat.cases.length + ' 症例 ｜ 症例を選んで学習';
  const listHeader = document.querySelector('.list-header');
  listHeader.style.borderBottom = '1px solid ' + cat.color + '33';
  renderCaseList(cat);
  window.scrollTo(0,0);
}
function showCase(catId, caseId) {
  currentCatId = catId;
  currentCaseId = caseId;
  revealed = {};
  const cat = CATEGORIES.find(c=>c.id===catId);
  const caseData = cat.cases.find(c=>c.id===caseId);
  hide('page-home'); hide('page-list'); show('page-case');
  document.getElementById('case-header-title').textContent = cat.label + ' — 症例 ' + caseId + '/' + cat.cases.length;
  document.getElementById('case-header-title').style.color = cat.color;
  const prev = document.getElementById('btn-prev');
  const next = document.getElementById('btn-next');
  if (caseId > 1) { prev.style.display=''; prev.style.color=cat.color; prev.style.borderColor=cat.color+'44'; prev.style.background=cat.color+'12'; } else { prev.style.display='none'; }
  if (caseId < cat.cases.length) { next.style.display=''; next.style.color=cat.color; next.style.borderColor=cat.color+'44'; next.style.background=cat.color+'12'; } else { next.style.display='none'; }
  renderCase(cat, caseData);
  window.scrollTo(0,0);
}
function navCase(dir) {
  const cat = CATEGORIES.find(c=>c.id===currentCatId);
  const newId = currentCaseId + dir;
  if (newId >= 1 && newId <= cat.cases.length) showCase(currentCatId, newId);
}

function hide(id){ document.getElementById(id).style.display='none'; }
function show(id){ document.getElementById(id).style.display='block'; }

function renderCaseList(cat) {
  const el = document.getElementById('case-list');
  el.innerHTML = cat.cases.map(c => `
    <div class="case-row" onclick="showCase('${cat.id}',${c.id})">
      <div class="case-left-bar" style="background:${cat.color}"></div>
      <div class="case-num" style="background:${cat.color}18;color:${cat.color}">${c.id}</div>
      <div style="flex:1">
        <div class="case-symptom">${escHtml(c.symptom)}</div>
        <div class="case-disease">${escHtml(c.disease)}</div>
      </div>
      <div class="case-chevron">›</div>
    </div>
  `).join('');
}

const Q_CONFIG = [
  { key:'q1', label:'Q1：原因となる薬は？', icon:'💊', color:'#0077B6' },
  { key:'q2', label:'Q2：観察ポイントは？', icon:'👁️', color:'#C0671A' },
  { key:'q3', label:'Q3：副作用は？',       icon:'⚠️',  color:'#C1121F' }
];

function renderCase(cat, caseData) {
  const el = document.getElementById('case-body');
  el.innerHTML = `
    <div class="case-card" style="border-color:${cat.color}33">
      <div class="case-badge" style="background:${cat.color}18;color:${cat.color}">${cat.icon} ${cat.label} ｜ CASE ${String(caseData.id).padStart(2,'0')}</div>
      <div class="case-symptom-title">🩺 ${escHtml(caseData.symptom)}</div>
      <div class="case-info-box">
        <span style="font-size:17px">🏥</span>
        <div><div class="case-info-label">疾患名</div><div class="case-info-text">${escHtml(caseData.disease)}</div></div>
      </div>
      <div class="case-info-box" style="display:block">
        <div class="case-info-label">関連薬剤</div>
        <div class="case-drug-text">${escHtml(caseData.drug)}</div>
      </div>
    </div>
    <div class="progress-bar-row" id="prog-row">
      ${Q_CONFIG.map(q=>`<div class="progress-seg" id="prog-${q.key}"></div>`).join('')}
    </div>
    <div class="progress-label" id="prog-label">0 / 3 解答済み</div>
    ${Q_CONFIG.map(q=>`
      <div class="q-card" id="qcard-${q.key}">
        <button class="q-btn" id="qbtn-${q.key}" onclick="toggleQ('${q.key}','${q.color}','${cat.id}',${caseData.id})">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="q-icon-wrap" style="background:${q.color}18">${q.icon}</div>
            <span class="q-label" id="qlbl-${q.key}">${q.label}</span>
          </div>
          <div class="q-chevron" id="qchev-${q.key}" style="background:${q.color}18;color:${q.color}">▼</div>
        </button>
        <div class="q-answer" id="qans-${q.key}" style="display:none;border-color:${q.color};background:${q.color}08">
          <div class="q-answer-text" style="border-left-color:${q.color}">${escHtml(caseData[q.key])}</div>
        </div>
      </div>
    `).join('')}
    <div id="done-card" style="display:none" class="done-card">
      <div style="font-size:30px">✅</div>
      <div class="done-title">全問確認完了！</div>
      <div id="done-next"></div>
    </div>
  `;
  updateProgress(cat);
}

function toggleQ(key, color, catId, caseId) {
  revealed[key] = !revealed[key];
  const ans = document.getElementById('qans-'+key);
  const btn = document.getElementById('qbtn-'+key);
  const chev = document.getElementById('qchev-'+key);
  const lbl = document.getElementById('qlbl-'+key);
  const q = Q_CONFIG.find(q=>q.key===key);
  if (revealed[key]) {
    ans.style.display='block';
    btn.classList.add('open');
    btn.style.background = color+'0e';
    btn.style.borderColor = color;
    lbl.style.color = color;
    chev.classList.add('open');
  } else {
    ans.style.display='none';
    btn.classList.remove('open');
    btn.style.background = 'white';
    btn.style.borderColor = '#e0e4ee';
    lbl.style.color = '#2a2a3e';
    chev.classList.remove('open');
  }
  const cat = CATEGORIES.find(c=>c.id===catId);
  updateProgress(cat);
}

function updateProgress(cat) {
  const count = Q_CONFIG.filter(q=>revealed[q.key]).length;
  Q_CONFIG.forEach(q => {
    const seg = document.getElementById('prog-'+q.key);
    if (seg) seg.style.background = revealed[q.key] ? q.color : '#e0e4ee';
  });
  const lbl = document.getElementById('prog-label');
  if (lbl) lbl.textContent = count + ' / 3 解答済み';
  if (count === 3) {
    const done = document.getElementById('done-card');
    if (done) {
      done.style.display='block';
      const nextEl = document.getElementById('done-next');
      if (currentCaseId < cat.cases.length) {
        nextEl.innerHTML = `<button class="next-btn" style="background:linear-gradient(135deg,${cat.color} 0%,${cat.accent} 100%);box-shadow:0 4px 14px ${cat.color}44" onclick="showCase('${cat.id}',${currentCaseId+1})">次の症例へ →</button>`;
      } else {
        nextEl.innerHTML = `<div style="color:#888;font-size:12px;margin-bottom:10px">🎉 このカテゴリー完了！</div><button class="back-cat-btn" style="color:${cat.color};border-color:${cat.color};background:${cat.color}10" onclick="showHome()">カテゴリー選択へ戻る</button>`;
      }
    }
  }
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Build home category cards
(function buildHome(){
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = CATEGORIES.map(cat => `
    <div class="cat-card" style="background:${cat.bg};border-color:${cat.color}33" onclick="showList('${cat.id}')">
      <div class="cat-icon">${cat.icon}</div>
      <div class="cat-name" style="color:${cat.color}">${cat.label}</div>
      <div class="cat-badge" style="background:${cat.color}18;color:${cat.color}">${cat.cases.length} 症例</div>
      <div class="cat-arrow" style="color:${cat.color}">→</div>
    </div>
  `).join('');
})();
</script>
